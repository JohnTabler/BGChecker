<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BGTrack — Record</title>
  <script>
    (function() { const t = localStorage.getItem('bgtrack-theme'); if (t === 'light') document.documentElement.setAttribute('data-theme', 'light'); })();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --body-bg:#0d0d0d; --body-glow:radial-gradient(ellipse 80% 50% at 20% 0%,rgba(255,255,255,0.015) 0%,transparent 60%);
      --header-bg:rgba(10,10,10,0.90); --header-border:rgba(255,255,255,0.08);
      --card-bg:#161616; --card-border:rgba(255,255,255,0.08); --card-inner-border:rgba(255,255,255,0.05);
      --text-heading:#f0f0f0; --text-body:#b0b0b0; --text-secondary:#707070; --text-muted:#3d3d3d;
      --accent:#d0d0d0; --accent-hover:#ffffff;
      --row-border:rgba(255,255,255,0.05); --row-hover:rgba(255,255,255,0.03); --loader-bg:#0d0d0d;
      --input-bg:#111111; --input-border:rgba(255,255,255,0.1); --input-focus:#888888;
    }
    [data-theme="light"] {
      --body-bg:#f5f5f5; --body-glow:none;
      --header-bg:rgba(255,255,255,0.92); --header-border:#e0e0e0;
      --card-bg:#ffffff; --card-border:#e0e0e0; --card-inner-border:#f0f0f0;
      --text-heading:#111111; --text-body:#333333; --text-secondary:#777777; --text-muted:#aaaaaa;
      --accent:#222222; --accent-hover:#000000;
      --row-border:#f0f0f0; --row-hover:rgba(0,0,0,0.02); --loader-bg:#f5f5f5;
      --input-bg:#ffffff; --input-border:#e0e0e0; --input-focus:#666666;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'Outfit', sans-serif; background: var(--body-bg); background-image: var(--body-glow); transition: background 0.3s; }
    .page-header { background: var(--header-bg); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border-bottom: 1px solid var(--header-border); padding: 0 24px; height: 52px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 20; transition: background 0.3s, border-color 0.3s; }
    .breadcrumb  { font-size: 0.875rem; display: flex; align-items: center; gap: 7px; }
    .bc-link     { color: var(--text-secondary); text-decoration: none; font-weight: 500; transition: color 0.12s; }
    .bc-link:hover { color: var(--text-heading); }
    .bc-sep      { color: var(--text-muted); }
    .bc-cur      { color: var(--text-heading); font-weight: 600; }
    .card        { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; overflow: hidden; transition: background 0.3s, border-color 0.3s; }
    .card-header { padding: 15px 22px; border-bottom: 1px solid var(--card-inner-border); background: var(--row-hover); display: flex; align-items: center; justify-content: space-between; }
    .card-title  { font-size: 0.875rem; font-weight: 700; color: var(--text-heading); letter-spacing: -0.015em; }
    .card-meta   { font-size: 0.75rem; color: var(--text-secondary); margin-top: 2px; }
    .field-label { display: block; font-size: 0.6875rem; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 5px; }
    .field-input {
      width: 100%; padding: 9px 12px; border: 1.5px solid var(--input-border); border-radius: 8px;
      font-size: 0.875rem; font-family: inherit; outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      background: var(--input-bg); color: var(--text-heading);
    }
    .field-input:focus { border-color: var(--input-focus); box-shadow: 0 0 0 3px rgba(128,128,128,0.12); }
    .field-input:disabled { background: var(--row-hover); color: var(--text-secondary); cursor: default; border-color: var(--row-border); }
    .field-input option { background: var(--card-bg); color: var(--text-heading); }
    .btn-primary  { display:inline-flex;align-items:center;gap:5px;padding:7px 14px;background:var(--text-heading);color:var(--body-bg);font-size:0.8125rem;font-weight:600;border:none;border-radius:7px;cursor:pointer;font-family:inherit;letter-spacing:-0.01em;transition:background 0.15s,color 0.15s; }
    .btn-primary:hover { background:var(--accent-hover);color:var(--body-bg); }
    .btn-secondary{ display:inline-flex;align-items:center;gap:5px;padding:7px 14px;background:var(--card-border);color:var(--text-body);font-size:0.8125rem;font-weight:600;border:none;border-radius:7px;cursor:pointer;font-family:inherit;letter-spacing:-0.01em;transition:background 0.15s;text-decoration:none; }
    .btn-secondary:hover { background:var(--card-inner-border); }
    .btn-danger   { display:inline-flex;align-items:center;gap:5px;padding:8px 16px;background:rgba(255,255,255,0.1);color:var(--text-heading);font-size:0.875rem;font-weight:600;border:1px solid rgba(255,255,255,0.2);border-radius:8px;cursor:pointer;font-family:inherit;transition:background 0.15s; }
    .btn-danger:hover { background:rgba(255,255,255,0.18); }
  </style>
</head>
<body>
  <aside id="sidebar" class="w-56 flex-shrink-0 flex flex-col min-h-screen fixed top-0 left-0 z-30" style="background:linear-gradient(180deg,#111111 0%,#0a0a0a 100%);"></aside>
  <div class="ml-56 flex-1 flex flex-col min-h-screen">

    <header class="page-header">
      <div id="profile-area" style="position:absolute;right:24px;top:50%;transform:translateY(-50%);"></div>
      <div class="breadcrumb">
        <a href="records.html" class="bc-link">Records</a>
        <span class="bc-sep">›</span>
        <span id="breadcrumb-label" class="bc-cur">—</span>
      </div>
    </header>

    <div id="page-loader" class="fixed inset-0 z-50 flex items-center justify-center" style="background:var(--loader-bg);">
      <svg class="w-8 h-8" style="animation:spin 0.9s linear infinite;color:#888888;" fill="none" viewBox="0 0 24 24">
        <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
        <circle style="opacity:.2" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
        <path style="opacity:.8" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
      </svg>
    </div>

    <main style="padding:22px 24px;max-width:740px;display:flex;flex-direction:column;gap:16px;">

      <!-- Record card -->
      <div class="card">
        <div class="card-header">
          <div>
            <h2 id="page-title" class="card-title">Record Detail</h2>
            <p id="record-meta" class="card-meta"></p>
          </div>
          <div id="action-buttons" style="display:flex;align-items:center;gap:8px;"></div>
        </div>

        <div style="padding:22px;display:grid;grid-template-columns:1fr 1fr;gap:18px;">
          <div>
            <label class="field-label" for="f-employee">Employee Name <span style="color:var(--text-secondary);">*</span></label>
            <input id="f-employee" type="text" class="field-input" placeholder="Full name" disabled />
          </div>
          <div>
            <label class="field-label" for="f-project">Project <span style="color:var(--text-secondary);">*</span></label>
            <input id="f-project" type="text" class="field-input" placeholder="Project name" disabled />
          </div>
          <div>
            <label class="field-label" for="f-vendor">Vendor</label>
            <input id="f-vendor" type="text" class="field-input" placeholder="Vendor name" disabled />
          </div>
          <div>
            <label class="field-label" for="f-status">Status <span style="color:var(--text-secondary);">*</span></label>
            <select id="f-status" class="field-input" disabled>
              <option value="">Select status</option>
              <option>Pending</option><option>Cleared</option><option>Failed</option><option>Cancelled</option>
            </select>
          </div>
          <div>
            <label class="field-label" for="f-date-ordered">Date Ordered <span style="color:var(--text-secondary);">*</span></label>
            <input id="f-date-ordered" type="date" class="field-input" disabled />
          </div>
          <div>
            <label class="field-label" for="f-date-processed">Date Processed</label>
            <input id="f-date-processed" type="date" class="field-input" disabled />
          </div>
          <div style="grid-column:1/-1;">
            <label class="field-label" for="f-doc-url">Document Link</label>
            <input id="f-doc-url" type="url" class="field-input" placeholder="https://sharepoint.com/..." disabled />
            <a id="doc-link-btn" href="#" target="_blank" rel="noopener"
              class="hidden btn-primary"
              style="margin-top:8px;font-size:0.75rem;padding:6px 12px;">
              Open Document ↗
            </a>
          </div>
          <div style="grid-column:1/-1;">
            <label class="field-label">Expiration Date</label>
            <div id="expiration-display" style="padding:9px 12px;background:var(--row-hover);border:1px solid var(--row-border);border-radius:8px;font-size:0.875rem;color:var(--text-secondary);font-style:italic;">
              Set automatically from Date Processed (+ 6 months)
            </div>
          </div>
        </div>

        <div id="form-error" class="hidden" style="margin:0 22px 18px;padding:11px 13px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.12);border-radius:8px;">
          <p style="font-size:0.875rem;color:var(--text-body);font-weight:500;margin:0;" id="form-error-text"></p>
        </div>
      </div>

      <!-- Delete zone -->
      <div id="delete-zone" class="hidden" style="background:var(--card-bg);border:1px solid var(--card-border);border-radius:12px;padding:18px 22px;">
        <h3 style="font-size:0.875rem;font-weight:700;color:var(--text-heading);margin:0 0 5px;letter-spacing:-0.015em;">Danger Zone</h3>
        <p style="font-size:0.8125rem;color:var(--text-secondary);margin:0 0 13px;">Deleting this record is permanent and cannot be undone.</p>
        <button id="delete-btn" class="btn-danger">Delete this record</button>
      </div>
    </main>
  </div>

  <script src="assets/config.js"></script>
  <script src="assets/auth.js"></script>
  <script src="assets/db.js"></script>
  <script src="assets/ui.js"></script>
  <script>
    let currentUser = null, record = null, isEditing = false;
    const params = new URLSearchParams(window.location.search);
    const recordId = params.get('id');
    const mode = params.get('mode');

    async function init() {
      currentUser = await Auth.guard('viewer');
      if (!currentUser) return;
      UI.renderNav(currentUser);
      UI.injectThemeToggle();
      Auth.startSessionTimeout();
      if (mode === 'new') {
        if (!Auth.isManager(currentUser)) { window.location.href = 'records.html'; return; }
        setupNewMode();
      } else if (recordId) {
        await loadRecord(recordId);
      } else {
        window.location.href = 'records.html'; return;
      }
      UI.hideLoader();
    }

    function setupNewMode() {
      isEditing = true;
      document.getElementById('page-title').textContent = 'New Record';
      document.getElementById('breadcrumb-label').textContent = 'New Record';
      setFieldsEnabled(true);
      renderActionButtons('new');
    }

    async function loadRecord(id) {
      try {
        record = await DB.getRecordById(id);
        populateFields(record);
        document.getElementById('breadcrumb-label').textContent = record.employee_name;
        document.getElementById('page-title').textContent = record.employee_name;
        document.getElementById('record-meta').textContent = `Added ${UI.formatDate(record.created_at)} · Updated ${UI.formatDate(record.updated_at)}`;
        renderActionButtons('view');
        if (Auth.isAdmin(currentUser)) document.getElementById('delete-zone').classList.remove('hidden');
      } catch(err) { UI.toast('Failed to load record.','error'); console.error(err); }
    }

    function populateFields(r) {
      document.getElementById('f-employee').value       = r.employee_name   || '';
      document.getElementById('f-project').value        = r.project         || '';
      document.getElementById('f-vendor').value         = r.vendor          || '';
      document.getElementById('f-status').value         = r.status          || '';
      document.getElementById('f-date-ordered').value   = r.date_ordered    || '';
      document.getElementById('f-date-processed').value = r.date_processed  || '';
      document.getElementById('f-doc-url').value        = r.document_url    || '';
      const docBtn = document.getElementById('doc-link-btn');
      if (r.document_url) { docBtn.href = r.document_url; docBtn.classList.remove('hidden'); }
      else { docBtn.classList.add('hidden'); }
      updateExpirationDisplay(r.date_processed);
    }

    function updateExpirationDisplay(dp) {
      const el = document.getElementById('expiration-display');
      if (!dp) {
        el.textContent = 'Set automatically from Date Processed (+ 6 months)';
        el.style.fontStyle = 'italic'; el.style.color = '#9ca3af';
        el.innerHTML = el.textContent; return;
      }
      const d = new Date(dp); d.setMonth(d.getMonth()+6);
      const expStr = d.toISOString().split('T')[0];
      el.style.fontStyle = 'normal'; el.style.color = '#94a3b8';
      el.innerHTML = `${UI.expirationBadge(expStr)}<span style="margin-left:8px;">${UI.formatDate(expStr)}</span>`;
    }

    document.getElementById('f-date-processed').addEventListener('change', e => updateExpirationDisplay(e.target.value));

    function setFieldsEnabled(enabled) {
      ['f-employee','f-project','f-vendor','f-status','f-date-ordered','f-date-processed','f-doc-url']
        .forEach(id => document.getElementById(id).disabled = !enabled);
    }

    function renderActionButtons(state) {
      const container = document.getElementById('action-buttons');
      const canEdit   = Auth.isManager(currentUser);
      if (state === 'view') {
        container.innerHTML = canEdit ? `<button id="edit-btn" class="btn-primary">Edit</button>` : '';
        if (canEdit) document.getElementById('edit-btn').addEventListener('click', () => { isEditing=true; setFieldsEnabled(true); renderActionButtons('editing'); });
      }
      if (state === 'editing') {
        container.innerHTML = `
          <button id="cancel-btn" class="btn-secondary">Cancel</button>
          <button id="save-btn"   class="btn-primary">Save Changes</button>`;
        document.getElementById('cancel-btn').addEventListener('click', () => { if(record) populateFields(record); setFieldsEnabled(false); isEditing=false; renderActionButtons('view'); });
        document.getElementById('save-btn').addEventListener('click', saveRecord);
      }
      if (state === 'new') {
        container.innerHTML = `
          <a href="records.html" class="btn-secondary">Cancel</a>
          <button id="save-btn" class="btn-primary">Create Record</button>`;
        document.getElementById('save-btn').addEventListener('click', saveRecord);
      }
    }

    async function saveRecord() {
      const errDiv = document.getElementById('form-error');
      errDiv.classList.add('hidden');
      const payload = {
        employee_name:  document.getElementById('f-employee').value.trim(),
        project:        document.getElementById('f-project').value.trim(),
        vendor:         document.getElementById('f-vendor').value.trim(),
        status:         document.getElementById('f-status').value,
        date_ordered:   document.getElementById('f-date-ordered').value || null,
        date_processed: document.getElementById('f-date-processed').value || null,
        document_url:   document.getElementById('f-doc-url').value.trim() || null,
      };
      const missing = [];
      if (!payload.employee_name) missing.push('Employee Name');
      if (!payload.project)       missing.push('Project');
      if (!payload.status)        missing.push('Status');
      if (!payload.date_ordered)  missing.push('Date Ordered');
      if (missing.length) {
        document.getElementById('form-error-text').textContent = `Required: ${missing.join(', ')}`;
        errDiv.classList.remove('hidden'); return;
      }
      const btn = document.getElementById('save-btn');
      btn.textContent = 'Saving…'; btn.disabled = true;
      try {
        if (mode === 'new') {
          const created = await DB.createRecord(payload);
          UI.toast('Record created.','success');
          window.location.href = `record-detail.html?id=${created.id}`;
        } else {
          record = await DB.updateRecord(recordId, payload);
          populateFields(record); setFieldsEnabled(false); isEditing=false; renderActionButtons('view');
          UI.toast('Record saved.','success');
        }
      } catch(err) {
        document.getElementById('form-error-text').textContent = err.message || 'Failed to save.';
        errDiv.classList.remove('hidden');
        btn.textContent = mode==='new'?'Create Record':'Save Changes'; btn.disabled=false;
      }
    }

    document.getElementById('delete-btn').addEventListener('click', async () => {
      const confirmed = await UI.confirm({ title:'Delete Record', message:`Delete record for ${record?.employee_name}? This cannot be undone.`, confirmLabel:'Delete', danger:true });
      if (!confirmed) return;
      try { await DB.deleteRecord(recordId); UI.toast('Record deleted.','success'); window.location.href='records.html'; }
      catch(err) { UI.toast('Failed to delete.','error'); }
    });

    init();
  </script>
</body>
</html>
