<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BGTrack — Records</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body{font-family:'Inter',sans-serif;} th{white-space:nowrap;}</style>
</head>
<header class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between sticky top-0 z-20">
  <h1 class="text-base font-semibold text-gray-800">Records</h1>
  <div class="flex items-center gap-3">
    <a id="bulk-upload-btn" href="bulk-upload.html" class="hidden items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-gray-600 bg-gray-100 rounded-lg hover:bg-gray-200 transition-colors">📤 Bulk Upload</a>
    <button id="export-btn" class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-gray-600 bg-gray-100 rounded-lg hover:bg-gray-200 transition-colors">⬇ Export CSV</button>
    <a id="add-record-btn" href="record-detail.html?mode=new" class="hidden items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-white bg-slate-700 rounded-lg hover:bg-slate-800 transition-colors">+ Add Record</a>
    <div id="profile-area"></div>
  </div>
</header>

    <div id="page-loader" class="fixed inset-0 z-50 bg-white flex items-center justify-center">
      <svg class="w-8 h-8 animate-spin text-slate-600" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
      </svg>
    </div>

    <main class="p-6 space-y-4">
      <!-- Filters -->
      <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-4">
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3">
          <input id="f-employee" type="text" placeholder="Employee name" class="col-span-2 md:col-span-1 px-3 py-2 border border-gray-300 rounded-lg text-xs focus:outline-none focus:ring-2 focus:ring-slate-400"/>
          <input id="f-project"  type="text" placeholder="Project"        class="px-3 py-2 border border-gray-300 rounded-lg text-xs focus:outline-none focus:ring-2 focus:ring-slate-400"/>
          <input id="f-vendor"   type="text" placeholder="Vendor"         class="px-3 py-2 border border-gray-300 rounded-lg text-xs focus:outline-none focus:ring-2 focus:ring-slate-400"/>
          <select id="f-status" class="px-3 py-2 border border-gray-300 rounded-lg text-xs focus:outline-none focus:ring-2 focus:ring-slate-400 text-gray-600">
            <option value="">All statuses</option>
            <option>Pending</option><option>Cleared</option><option>Failed</option><option>Cancelled</option>
          </select>
          <input id="f-date-from" type="date" title="Date ordered from" class="px-3 py-2 border border-gray-300 rounded-lg text-xs focus:outline-none focus:ring-2 focus:ring-slate-400 text-gray-600"/>
          <div class="flex gap-2">
            <input id="f-date-to" type="date" title="Date ordered to" class="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-xs focus:outline-none focus:ring-2 focus:ring-slate-400 text-gray-600"/>
            <button id="clear-filters" class="px-3 py-2 text-xs text-gray-400 hover:text-gray-700 border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors" title="Clear">✕</button>
          </div>
        </div>
      </div>

      <!-- Table -->
      <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
        <div class="px-5 py-3 border-b border-gray-100 flex items-center justify-between">
          <p class="text-xs font-medium text-gray-500"><span id="result-count">—</span> records</p>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="border-b border-gray-200 bg-gray-50">
                <th class="text-left px-5 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Employee</th>
                <th class="text-left px-5 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Project</th>
                <th class="text-left px-5 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Date Ordered</th>
                <th class="text-left px-5 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Vendor</th>
                <th class="text-left px-5 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Status</th>
                <th class="text-left px-5 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Expiration</th>
                <th class="text-left px-5 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Doc</th>
                <th class="px-5 py-3"></th>
              </tr>
            </thead>
            <tbody id="records-tbody" class="divide-y divide-gray-100">
              <tr><td colspan="7" class="text-center py-12 text-gray-400 text-sm">Loading records…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="assets/config.js"></script>
  <script src="assets/auth.js"></script>
  <script src="assets/db.js"></script>
  <script src="assets/ui.js"></script>
  <script src="assets/export.js"></script>
  <script>
    let currentUser = null, allRecords = [], filteredRecs = [];

    async function init() {
      currentUser = await Auth.guard('viewer');
      if (!currentUser) return;
      UI.renderNav(currentUser);
      Auth.startSessionTimeout();
      if (Auth.isManager(currentUser)) {
        document.getElementById('add-record-btn').classList.replace('hidden','flex');
        document.getElementById('bulk-upload-btn').classList.replace('hidden','flex');
      }
      await loadRecords();
      attachFilterListeners();
      UI.hideLoader();
    }

    async function loadRecords() {
      try {
        allRecords = await DB.getRecords();
        filteredRecs = [...allRecords];
        renderTable(filteredRecs);
      } catch(err) { UI.toast('Failed to load records.','error'); console.error(err); }
    }

    function renderTable(records) {
      document.getElementById('result-count').textContent = records.length;
      const tbody = document.getElementById('records-tbody');
      if (!records.length) { tbody.innerHTML = `<tr><td colspan="7" class="text-center py-12 text-gray-400 text-sm">No records found.</td></tr>`; return; }
      tbody.innerHTML = records.map(r => `
        <tr class="hover:bg-slate-50 transition-colors">
          <td class="px-5 py-3.5 font-medium text-gray-900 text-sm">${r.employee_name}</td>
          <td class="px-5 py-3.5 text-gray-600 text-sm">${r.project}</td>
          <td class="px-5 py-3.5 text-gray-600 text-sm">${UI.formatDate(r.date_ordered)}</td>
          <td class="px-5 py-3.5 text-gray-600 text-sm">${r.vendor || '—'}</td>
          <td class="px-5 py-3.5">${UI.statusBadge(r.status)}</td>
          <td class="px-5 py-3.5">${UI.expirationBadge(r.expiration_date)}</td>
          <td class="px-5 py-3.5">${r.document_url ? `<a href="${r.document_url}" target="_blank" rel="noopener" class="text-xs font-medium text-blue-600 hover:text-blue-700">View ↗</a>` : '<span class="text-xs text-gray-300">—</span>'}</td>
          <td class="px-5 py-3.5 text-right"><a href="record-detail.html?id=${r.id}" class="text-xs font-medium text-blue-600 hover:text-blue-700">View →</a></td>
        </tr>`).join('');
    }

    function applyFilters() {
      const e = document.getElementById('f-employee').value.trim().toLowerCase();
      const p = document.getElementById('f-project').value.trim().toLowerCase();
      const v = document.getElementById('f-vendor').value.trim().toLowerCase();
      const s = document.getElementById('f-status').value;
      const df = document.getElementById('f-date-from').value;
      const dt = document.getElementById('f-date-to').value;
      filteredRecs = allRecords.filter(r => {
        if (e && !r.employee_name?.toLowerCase().includes(e)) return false;
        if (p && !r.project?.toLowerCase().includes(p)) return false;
        if (v && !r.vendor?.toLowerCase().includes(v)) return false;
        if (s && r.status !== s) return false;
        if (df && r.date_ordered < df) return false;
        if (dt && r.date_ordered > dt) return false;
        return true;
      });
      renderTable(filteredRecs);
    }

    function attachFilterListeners() {
      ['f-employee','f-project','f-vendor','f-status','f-date-from','f-date-to'].forEach(id =>
        document.getElementById(id).addEventListener('input', applyFilters));
      document.getElementById('clear-filters').addEventListener('click', () => {
        ['f-employee','f-project','f-vendor','f-date-from','f-date-to'].forEach(id => document.getElementById(id).value='');
        document.getElementById('f-status').value='';
        applyFilters();
      });
      document.getElementById('export-btn').addEventListener('click', () =>
        Exporter.showExportModal({ allRows: allRecords, filteredRows: filteredRecs, type: 'records' }));
    }
    init();
  </script>
</body>
</html>
