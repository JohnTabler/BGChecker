<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BGTrack — Records</title>
  <script>
    (function() { const t = localStorage.getItem('bgtrack-theme'); if (t === 'light') document.documentElement.setAttribute('data-theme', 'light'); })();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --body-bg:#0d0d0d; --body-glow:radial-gradient(ellipse 80% 50% at 20% 0%,rgba(255,255,255,0.015) 0%,transparent 60%);
      --header-bg:rgba(10,10,10,0.90); --header-border:rgba(255,255,255,0.08);
      --card-bg:#161616; --card-border:rgba(255,255,255,0.08); --card-inner-border:rgba(255,255,255,0.05);
      --text-heading:#f0f0f0; --text-body:#b0b0b0; --text-secondary:#707070; --text-muted:#3d3d3d;
      --accent:#d0d0d0; --accent-hover:#ffffff;
      --row-border:rgba(255,255,255,0.05); --row-hover:rgba(255,255,255,0.03); --loader-bg:#0d0d0d;
      --input-bg:#111111; --input-border:rgba(255,255,255,0.1); --input-focus:#888888;
    }
    [data-theme="light"] {
      --body-bg:#f5f5f5; --body-glow:none;
      --header-bg:rgba(255,255,255,0.92); --header-border:#e0e0e0;
      --card-bg:#ffffff; --card-border:#e0e0e0; --card-inner-border:#f0f0f0;
      --text-heading:#111111; --text-body:#333333; --text-secondary:#777777; --text-muted:#aaaaaa;
      --accent:#222222; --accent-hover:#000000;
      --row-border:#f0f0f0; --row-hover:rgba(0,0,0,0.02); --loader-bg:#f5f5f5;
      --input-bg:#ffffff; --input-border:#e0e0e0; --input-focus:#666666;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'Outfit', sans-serif; background: var(--body-bg); background-image: var(--body-glow); transition: background 0.3s; }
    .page-header { background: var(--header-bg); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border-bottom: 1px solid var(--header-border); padding: 0 24px; height: 52px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 20; transition: background 0.3s, border-color 0.3s; }
    .page-title  { font-size: 0.9375rem; font-weight: 700; color: var(--text-heading); letter-spacing: -0.02em; }
    .card        { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; transition: background 0.3s, border-color 0.3s; }
    .filter-input {
      padding: 7px 11px; border: 1.5px solid var(--input-border); border-radius: 7px;
      font-size: 0.8125rem; font-family: inherit; outline: none;
      color: var(--text-heading); background: var(--input-bg);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .filter-input:focus { border-color: var(--input-focus); box-shadow: 0 0 0 3px rgba(128,128,128,0.12); }
    .filter-input::placeholder { color: var(--text-secondary); }
    .filter-input option { background: var(--card-bg); color: var(--text-heading); }
    th { white-space: nowrap; }
    .tbl-head { font-size: 0.6875rem; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.07em; padding: 11px 16px; text-align: left; }
    .tbl-row { border-bottom: 1px solid var(--row-border); transition: background 0.1s; }
    .tbl-row:last-child { border-bottom: none; }
    .tbl-row:hover { background: var(--row-hover); }
    .tbl-cell { padding: 11px 16px; font-size: 0.875rem; color: var(--text-body); }
    .btn-primary  { display:inline-flex;align-items:center;gap:5px;padding:7px 13px;background:var(--text-heading);color:var(--body-bg);font-size:0.8125rem;font-weight:600;border:none;border-radius:7px;cursor:pointer;font-family:inherit;letter-spacing:-0.01em;text-decoration:none;transition:background 0.15s,color 0.15s; }
    .btn-primary:hover { background:var(--accent-hover);color:var(--body-bg); }
    .btn-secondary{ display:inline-flex;align-items:center;gap:5px;padding:7px 13px;background:var(--card-border);color:var(--text-body);font-size:0.8125rem;font-weight:600;border:none;border-radius:7px;cursor:pointer;font-family:inherit;letter-spacing:-0.01em;text-decoration:none;transition:background 0.15s; }
    .btn-secondary:hover { background:var(--card-inner-border); }
  </style>
</head>
<body>
  <aside id="sidebar" class="w-56 flex-shrink-0 flex flex-col min-h-screen fixed top-0 left-0 z-30" style="background:linear-gradient(180deg,#111111 0%,#0a0a0a 100%);"></aside>
  <div class="ml-56 flex-1 flex flex-col min-h-screen">

    <header class="page-header">
      <h1 class="page-title">Records</h1>
      <div class="flex items-center gap-2.5">
        <a id="bulk-upload-btn" href="bulk-upload.html" class="btn-secondary hidden">
          <svg style="width:14px;height:14px;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
          Bulk Upload
        </a>
        <button id="export-btn" class="btn-secondary">
          <svg style="width:14px;height:14px;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
          Export CSV
        </button>
        <a id="add-record-btn" href="record-detail.html?mode=new" class="btn-primary hidden">
          <svg style="width:13px;height:13px;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
          Add Record
        </a>
        <div id="profile-area"></div>
      </div>
    </header>

    <div id="page-loader" class="fixed inset-0 z-50 flex items-center justify-center" style="background:var(--loader-bg);">
      <svg class="w-8 h-8" style="animation:spin 0.9s linear infinite;color:#888888;" fill="none" viewBox="0 0 24 24">
        <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
        <circle style="opacity:.2" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
        <path style="opacity:.8" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
      </svg>
    </div>

    <main style="padding:22px 24px;display:flex;flex-direction:column;gap:16px;">

      <!-- Filters -->
      <div class="card" style="padding:14px 16px;">
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-2.5">
          <input id="f-employee"  type="text"  placeholder="Employee name" class="filter-input col-span-2 md:col-span-1"/>
          <input id="f-project"   type="text"  placeholder="Project"       class="filter-input"/>
          <input id="f-vendor"    type="text"  placeholder="Vendor"        class="filter-input"/>
          <select id="f-status" class="filter-input" style="color:#374151;">
            <option value="">All statuses</option>
            <option>Pending</option><option>Cleared</option><option>Failed</option><option>Cancelled</option>
          </select>
          <input id="f-date-from" type="date" title="Date ordered from" class="filter-input"/>
          <div style="display:flex;gap:6px;">
            <input id="f-date-to"  type="date" title="Date ordered to"   class="filter-input" style="flex:1;"/>
            <button id="clear-filters" title="Clear filters" style="padding:7px 11px;border:1.5px solid var(--input-border);border-radius:7px;background:var(--input-bg);color:var(--text-secondary);cursor:pointer;font-size:0.8125rem;transition:all 0.15s;font-family:inherit;" onmouseover="this.style.color='var(--text-body)'" onmouseout="this.style.color='var(--text-secondary)'">✕</button>
          </div>
        </div>
      </div>

      <!-- Table -->
      <div class="card overflow-hidden">
        <div style="padding:11px 16px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:space-between;">
          <p style="font-size:0.75rem;font-weight:600;color:#475569;"><span id="result-count">—</span> records</p>
        </div>
        <div class="overflow-x-auto">
          <table style="width:100%;border-collapse:collapse;">
            <thead>
              <tr style="border-bottom:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.03);">
                <th class="tbl-head">Employee</th>
                <th class="tbl-head">Project</th>
                <th class="tbl-head">Date Ordered</th>
                <th class="tbl-head">Vendor</th>
                <th class="tbl-head">Status</th>
                <th class="tbl-head">Expiration</th>
                <th class="tbl-head">Doc</th>
                <th class="tbl-head" style="width:40px;"></th>
              </tr>
            </thead>
            <tbody id="records-tbody">
              <tr><td colspan="8" style="text-align:center;padding:48px 16px;font-size:0.875rem;color:#475569;">Loading records…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="assets/config.js"></script>
  <script src="assets/auth.js"></script>
  <script src="assets/db.js"></script>
  <script src="assets/ui.js"></script>
  <script src="assets/export.js"></script>
  <script>
    let currentUser = null, allRecords = [], filteredRecs = [];

    async function init() {
      currentUser = await Auth.guard('viewer');
      if (!currentUser) return;
      UI.renderNav(currentUser);
      UI.injectThemeToggle();
      Auth.startSessionTimeout();
      if (Auth.isManager(currentUser)) {
        document.getElementById('add-record-btn').classList.replace('hidden','inline-flex');
        document.getElementById('bulk-upload-btn').classList.replace('hidden','inline-flex');
      }
      await loadRecords();
      attachFilterListeners();
      UI.hideLoader();
    }

    async function loadRecords() {
      try {
        allRecords = await DB.getRecords();
        filteredRecs = [...allRecords];
        renderTable(filteredRecs);
      } catch(err) { UI.toast('Failed to load records.','error'); console.error(err); }
    }

    function renderTable(records) {
      document.getElementById('result-count').textContent = records.length;
      const tbody = document.getElementById('records-tbody');
      if (!records.length) {
        tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:48px 16px;font-size:0.875rem;color:#475569;">No records found.</td></tr>`;
        return;
      }
      tbody.innerHTML = records.map(r => `
        <tr class="tbl-row">
          <td class="tbl-cell" style="font-weight:600;color:var(--text-heading);">${r.employee_name}</td>
          <td class="tbl-cell" style="color:var(--text-body);">${r.project}</td>
          <td class="tbl-cell" style="color:var(--text-secondary);">${UI.formatDate(r.date_ordered)}</td>
          <td class="tbl-cell" style="color:var(--text-secondary);">${r.vendor || '—'}</td>
          <td class="tbl-cell">${UI.statusBadge(r.status)}</td>
          <td class="tbl-cell">${UI.expirationBadge(r.expiration_date)}</td>
          <td class="tbl-cell">${r.document_url ? `<a href="${r.document_url}" target="_blank" rel="noopener" style="font-size:0.75rem;font-weight:600;color:var(--accent);text-decoration:none;" onmouseover="this.style.color='var(--accent-hover)'" onmouseout="this.style.color='var(--accent)'">View ↗</a>` : `<span style="color:var(--text-muted);">—</span>`}</td>
          <td class="tbl-cell" style="text-align:right;"><a href="record-detail.html?id=${r.id}" style="font-size:0.75rem;font-weight:600;color:var(--accent);text-decoration:none;" onmouseover="this.style.color='var(--accent-hover)'" onmouseout="this.style.color='var(--accent)'">View →</a></td>
        </tr>`).join('');
    }

    function applyFilters() {
      const e = document.getElementById('f-employee').value.trim().toLowerCase();
      const p = document.getElementById('f-project').value.trim().toLowerCase();
      const v = document.getElementById('f-vendor').value.trim().toLowerCase();
      const s = document.getElementById('f-status').value;
      const df = document.getElementById('f-date-from').value;
      const dt = document.getElementById('f-date-to').value;
      filteredRecs = allRecords.filter(r => {
        if (e && !r.employee_name?.toLowerCase().includes(e)) return false;
        if (p && !r.project?.toLowerCase().includes(p)) return false;
        if (v && !r.vendor?.toLowerCase().includes(v)) return false;
        if (s && r.status !== s) return false;
        if (df && r.date_ordered < df) return false;
        if (dt && r.date_ordered > dt) return false;
        return true;
      });
      renderTable(filteredRecs);
    }

    function attachFilterListeners() {
      ['f-employee','f-project','f-vendor','f-status','f-date-from','f-date-to'].forEach(id =>
        document.getElementById(id).addEventListener('input', applyFilters));
      document.getElementById('clear-filters').addEventListener('click', () => {
        ['f-employee','f-project','f-vendor','f-date-from','f-date-to'].forEach(id => document.getElementById(id).value='');
        document.getElementById('f-status').value='';
        applyFilters();
      });
      document.getElementById('export-btn').addEventListener('click', () =>
        Exporter.showExportModal({ allRows: allRecords, filteredRows: filteredRecs, type: 'records' }));
    }
    init();
  </script>
</body>
</html>
