<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BGTrack — Records</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .nav-link { padding: 0.5rem 0.75rem; border-radius: 0.5rem; font-size: 0.875rem; font-weight: 500; color: #4b5563; transition: all 0.15s; }
    .nav-link:hover { color: #4f46e5; background-color: #eef2ff; }
    .nav-link-active { color: #4f46e5 !important; background-color: #eef2ff !important; }
    th { white-space: nowrap; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <header class="bg-white border-b border-gray-200 sticky top-0 z-40 shadow-sm">
    <div id="main-nav" class="max-w-7xl mx-auto"></div>
  </header>

  <div id="page-loader" class="fixed inset-0 z-50 bg-white flex items-center justify-center">
    <svg class="w-8 h-8 animate-spin text-indigo-600" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
    </svg>
  </div>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 py-8">

    <!-- Page header -->
    <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
      <div>
        <h1 class="text-2xl font-bold text-gray-900">Records</h1>
        <p class="text-sm text-gray-500 mt-1"><span id="result-count">—</span> records</p>
      </div>
      <div class="flex items-center gap-2">
        <!-- Bulk upload (Manager/Admin) -->
        <a id="bulk-upload-btn" href="bulk-upload.html"
          class="hidden items-center gap-2 px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
          </svg>
          Bulk Upload
        </a>
        <!-- Export -->
        <button id="export-btn"
          class="flex items-center gap-2 px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
          </svg>
          Export CSV
        </button>
        <!-- Add Record (Manager/Admin) -->
        <a id="add-record-btn" href="record-detail.html?mode=new"
          class="hidden items-center gap-2 px-4 py-2 text-sm font-medium text-white bg-indigo-600 rounded-lg hover:bg-indigo-700 transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
          </svg>
          Add Record
        </a>
      </div>
    </div>

    <!-- Filters -->
    <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-4 mb-5">
      <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3">
        <input id="f-employee" type="text" placeholder="Employee name"
          class="col-span-2 md:col-span-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
        <input id="f-project" type="text" placeholder="Project"
          class="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
        <input id="f-vendor" type="text" placeholder="Vendor"
          class="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
        <select id="f-status"
          class="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 text-gray-600">
          <option value="">All statuses</option>
          <option>Pending</option>
          <option>Cleared</option>
          <option>Failed</option>
          <option>Cancelled</option>
        </select>
        <input id="f-date-from" type="date" title="Date ordered from"
          class="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 text-gray-600" />
        <div class="flex gap-2">
          <input id="f-date-to" type="date" title="Date ordered to"
            class="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 text-gray-600" />
          <button id="clear-filters"
            class="px-3 py-2 text-sm text-gray-500 hover:text-gray-700 border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors" title="Clear filters">
            ✕
          </button>
        </div>
      </div>
    </div>

    <!-- Table -->
    <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-gray-200 bg-gray-50">
              <th class="text-left px-5 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Employee</th>
              <th class="text-left px-5 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Project</th>
              <th class="text-left px-5 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Date Ordered</th>
              <th class="text-left px-5 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Vendor</th>
              <th class="text-left px-5 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Status</th>
              <th class="text-left px-5 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Expiration</th>
              <th class="px-5 py-3"></th>
            </tr>
          </thead>
          <tbody id="records-tbody" class="divide-y divide-gray-100">
            <tr><td colspan="7" class="text-center py-12 text-gray-400">Loading records…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>

  <script src="assets/config.js"></script>
  <script src="assets/auth.js"></script>
  <script src="assets/db.js"></script>
  <script src="assets/ui.js"></script>
  <script src="assets/export.js"></script>
  <script>
    let currentUser  = null;
    let allRecords   = [];
    let filteredRecs = [];

    async function init() {
      currentUser = await Auth.guard('viewer');
      if (!currentUser) return;

      UI.renderNav(currentUser);

      // Show Manager/Admin-only buttons
      if (Auth.isManager(currentUser)) {
        document.getElementById('add-record-btn').classList.replace('hidden', 'flex');
        document.getElementById('bulk-upload-btn').classList.replace('hidden', 'flex');
      }

      await loadRecords();
      attachFilterListeners();
      UI.hideLoader();
    }

    async function loadRecords() {
      try {
        allRecords   = await DB.getRecords();
        filteredRecs = [...allRecords];
        renderTable(filteredRecs);
      } catch (err) {
        UI.toast('Failed to load records.', 'error');
        console.error(err);
      }
    }

    function renderTable(records) {
      const tbody = document.getElementById('records-tbody');
      document.getElementById('result-count').textContent = records.length;

      if (!records.length) {
        tbody.innerHTML = `<tr><td colspan="7" class="text-center py-12 text-gray-400">No records found.</td></tr>`;
        return;
      }

      tbody.innerHTML = records.map(r => `
        <tr class="hover:bg-gray-50 transition-colors">
          <td class="px-5 py-3.5 font-medium text-gray-900">${r.employee_name}</td>
          <td class="px-5 py-3.5 text-gray-600">${r.project}</td>
          <td class="px-5 py-3.5 text-gray-600">${UI.formatDate(r.date_ordered)}</td>
          <td class="px-5 py-3.5 text-gray-600">${r.vendor || '—'}</td>
          <td class="px-5 py-3.5">${UI.statusBadge(r.status)}</td>
          <td class="px-5 py-3.5">${UI.expirationBadge(r.expiration_date)}</td>
          <td class="px-5 py-3.5 text-right">
            <a href="record-detail.html?id=${r.id}"
              class="text-xs font-medium text-indigo-600 hover:text-indigo-700">View →</a>
          </td>
        </tr>
      `).join('');
    }

    function applyFilters() {
      const employee  = document.getElementById('f-employee').value.trim().toLowerCase();
      const project   = document.getElementById('f-project').value.trim().toLowerCase();
      const vendor    = document.getElementById('f-vendor').value.trim().toLowerCase();
      const status    = document.getElementById('f-status').value;
      const dateFrom  = document.getElementById('f-date-from').value;
      const dateTo    = document.getElementById('f-date-to').value;

      filteredRecs = allRecords.filter(r => {
        if (employee && !r.employee_name?.toLowerCase().includes(employee)) return false;
        if (project  && !r.project?.toLowerCase().includes(project))        return false;
        if (vendor   && !r.vendor?.toLowerCase().includes(vendor))           return false;
        if (status   && r.status !== status)                                  return false;
        if (dateFrom && r.date_ordered < dateFrom)                            return false;
        if (dateTo   && r.date_ordered > dateTo)                              return false;
        return true;
      });

      renderTable(filteredRecs);
    }

    function attachFilterListeners() {
      ['f-employee','f-project','f-vendor','f-status','f-date-from','f-date-to']
        .forEach(id => document.getElementById(id).addEventListener('input', applyFilters));

      document.getElementById('clear-filters').addEventListener('click', () => {
        ['f-employee','f-project','f-vendor','f-date-from','f-date-to']
          .forEach(id => document.getElementById(id).value = '');
        document.getElementById('f-status').value = '';
        applyFilters();
      });

      document.getElementById('export-btn').addEventListener('click', () => {
        Exporter.showExportModal({ allRows: allRecords, filteredRows: filteredRecs, type: 'records' });
      });
    }

    init();
  </script>
</body>
</html>
