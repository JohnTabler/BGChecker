<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BGTrack — Audit Log</title>
  <script>
    (function() { const t = localStorage.getItem('bgtrack-theme'); if (t === 'light') document.documentElement.setAttribute('data-theme', 'light'); })();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --body-bg:#0d0d0d; --body-glow:radial-gradient(ellipse 80% 50% at 20% 0%,rgba(255,255,255,0.015) 0%,transparent 60%);
      --header-bg:rgba(10,10,10,0.90); --header-border:rgba(255,255,255,0.08);
      --card-bg:#161616; --card-border:rgba(255,255,255,0.08); --card-inner-border:rgba(255,255,255,0.05);
      --text-heading:#f0f0f0; --text-body:#b0b0b0; --text-secondary:#707070; --text-muted:#3d3d3d;
      --accent:#d0d0d0; --accent-hover:#ffffff;
      --row-border:rgba(255,255,255,0.05); --row-hover:rgba(255,255,255,0.03); --loader-bg:#0d0d0d;
      --input-bg:#111111; --input-border:rgba(255,255,255,0.1); --input-focus:#888888;
    }
    [data-theme="light"] {
      --body-bg:#f5f5f5; --body-glow:none;
      --header-bg:rgba(255,255,255,0.92); --header-border:#e0e0e0;
      --card-bg:#ffffff; --card-border:#e0e0e0; --card-inner-border:#f0f0f0;
      --text-heading:#111111; --text-body:#333333; --text-secondary:#777777; --text-muted:#aaaaaa;
      --accent:#222222; --accent-hover:#000000;
      --row-border:#f0f0f0; --row-hover:rgba(0,0,0,0.02); --loader-bg:#f5f5f5;
      --input-bg:#ffffff; --input-border:#e0e0e0; --input-focus:#666666;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'Outfit', sans-serif; background: var(--body-bg); background-image: var(--body-glow); transition: background 0.3s; }
    .page-header  { background: var(--header-bg); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border-bottom: 1px solid var(--header-border); padding: 0 24px; height: 52px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 20; transition: background 0.3s, border-color 0.3s; }
    .breadcrumb   { font-size: 0.875rem; display: flex; align-items: center; gap: 7px; }
    .bc-link      { color: var(--text-secondary); text-decoration: none; font-weight: 500; transition: color 0.12s; display:inline-flex;align-items:center;gap:4px; }
    .bc-link:hover{ color: var(--text-heading); }
    .bc-sep       { color: var(--text-muted); }
    .page-title   { font-size: 0.9375rem; font-weight: 700; color: var(--text-heading); letter-spacing: -0.02em; }
    .card         { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; overflow: hidden; transition: background 0.3s, border-color 0.3s; }
    .card-header  { padding: 14px 20px; border-bottom: 1px solid var(--card-inner-border); background: var(--row-hover); display:flex;align-items:center;justify-content:space-between; }
    .field-label  { display: block; font-size: 0.6875rem; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 5px; }
    .field-input  {
      padding: 8px 11px; border: 1.5px solid var(--input-border); border-radius: 7px;
      font-size: 0.8125rem; font-family: inherit; outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      background: var(--input-bg); color: var(--text-heading);
    }
    .field-input:focus { border-color: var(--input-focus); box-shadow: 0 0 0 3px rgba(128,128,128,0.12); }
    .field-input option { background: var(--card-bg); color: var(--text-heading); }
    .btn-primary  { display:inline-flex;align-items:center;gap:5px;padding:8px 14px;background:var(--text-heading);color:var(--body-bg);font-size:0.8125rem;font-weight:600;border:none;border-radius:7px;cursor:pointer;font-family:inherit;transition:background 0.15s,color 0.15s; }
    .btn-primary:hover { background:var(--accent-hover);color:var(--body-bg); }
    .btn-secondary{ display:inline-flex;align-items:center;gap:5px;padding:8px 14px;background:var(--card-border);color:var(--text-body);font-size:0.8125rem;font-weight:600;border:none;border-radius:7px;cursor:pointer;font-family:inherit;transition:background 0.15s; }
    .btn-secondary:hover { background:var(--card-inner-border); }
    .btn-ghost    { padding:6px 12px;font-size:0.8125rem;font-weight:600;color:var(--text-secondary);background:var(--row-hover);border:1.5px solid var(--card-border);border-radius:7px;cursor:pointer;font-family:inherit;transition:all 0.15s; }
    .btn-ghost:hover { background:var(--card-border);color:var(--text-body); }
    .btn-ghost:disabled { opacity:0.4;cursor:not-allowed; }
    .tbl-head { font-size: 0.6875rem; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.07em; padding: 11px 16px; text-align: left; }
    .tbl-row  { border-bottom: 1px solid var(--row-border); transition: background 0.1s; }
    .tbl-row:last-child { border-bottom: none; }
    .tbl-row:hover { background: var(--row-hover); }
    .tbl-cell { padding: 11px 16px; font-size: 0.8125rem; color: var(--text-body); }
  </style>
</head>
<body>
  <aside id="sidebar" class="w-56 flex-shrink-0 flex flex-col min-h-screen fixed top-0 left-0 z-30" style="background:linear-gradient(180deg,#111111 0%,#0a0a0a 100%);"></aside>
  <div class="ml-56 flex-1 flex flex-col min-h-screen">

    <header class="page-header">
      <div class="breadcrumb">
        <a href="admin.html" class="bc-link">
          <svg style="width:13px;height:13px;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
          Admin
        </a>
        <span class="bc-sep">/</span>
        <h1 class="page-title">Audit Log</h1>
      </div>
      <div id="profile-area"></div>
    </header>

    <div id="page-loader" class="fixed inset-0 z-50 flex items-center justify-center" style="background:var(--loader-bg);">
      <svg class="w-8 h-8" style="animation:spin 0.9s linear infinite;color:#888888;" fill="none" viewBox="0 0 24 24">
        <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
        <circle style="opacity:.2" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
        <path style="opacity:.8" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
      </svg>
    </div>

    <main style="padding:22px 24px;max-width:1100px;display:flex;flex-direction:column;gap:16px;">

      <!-- Filters -->
      <div class="card" style="padding:16px 20px;">
        <div style="display:flex;flex-wrap:wrap;align-items:flex-end;gap:12px;">
          <div>
            <label class="field-label">Action</label>
            <select id="filter-action" class="field-input">
              <option value="">All Actions</option>
              <option value="INSERT">INSERT</option>
              <option value="UPDATE">UPDATE</option>
              <option value="DELETE">DELETE</option>
            </select>
          </div>
          <div>
            <label class="field-label">User</label>
            <select id="filter-user" class="field-input">
              <option value="">All Users</option>
            </select>
          </div>
          <div>
            <label class="field-label">From</label>
            <input id="filter-date-from" type="date" class="field-input"/>
          </div>
          <div>
            <label class="field-label">To</label>
            <input id="filter-date-to" type="date" class="field-input"/>
          </div>
          <div style="display:flex;gap:8px;">
            <button id="btn-apply" class="btn-primary">Apply</button>
            <button id="btn-clear" class="btn-secondary">Clear</button>
          </div>
          <div style="margin-left:auto;">
            <button id="btn-csv" class="btn-secondary">
              <svg style="width:14px;height:14px;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1M12 12V4m0 8l-3-3m3 3l3-3"/></svg>
              Download CSV
            </button>
          </div>
        </div>
      </div>

      <!-- Results table -->
      <div class="card">
        <div class="card-header">
          <span id="result-count" style="font-size:0.75rem;font-weight:600;color:#9ca3af;">Loading…</span>
        </div>
        <div class="overflow-x-auto">
          <table style="width:100%;border-collapse:collapse;">
            <thead>
              <tr style="border-bottom:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.03);">
                <th class="tbl-head">When</th>
                <th class="tbl-head">User</th>
                <th class="tbl-head">Action</th>
                <th class="tbl-head">Table</th>
                <th class="tbl-head">Record</th>
                <th class="tbl-head">Old Status</th>
                <th class="tbl-head">New Status</th>
              </tr>
            </thead>
            <tbody id="audit-tbody">
              <tr><td colspan="7" style="text-align:center;padding:48px;font-size:0.875rem;color:#9ca3af;">Loading…</td></tr>
            </tbody>
          </table>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-top:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.02);">
          <button id="btn-prev" class="btn-ghost" disabled>← Prev</button>
          <span id="page-indicator" style="font-size:0.8125rem;color:#475569;font-weight:500;"></span>
          <button id="btn-next" class="btn-ghost" disabled>Next →</button>
        </div>
      </div>

    </main>
  </div>

  <!-- CSV Export Modal -->
  <div id="csv-modal" class="hidden" style="position:fixed;inset:0;z-index:9999;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.5);backdrop-filter:blur(3px);">
    <div style="background:#1a1a1a;border-radius:14px;padding:24px;width:100%;max-width:400px;margin:0 16px;box-shadow:0 24px 48px rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.1);">
      <h3 style="font-size:0.9375rem;font-weight:700;color:#f0f0f0;margin:0 0 4px;letter-spacing:-0.02em;">Download CSV</h3>
      <p style="font-size:0.8125rem;color:#888888;margin:0 0 16px;">Choose what to include in the export.</p>
      <div style="display:flex;flex-direction:column;gap:8px;">
        <button id="csv-filtered" style="display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border:1.5px solid rgba(255,255,255,0.1);border-radius:10px;background:#111111;cursor:pointer;text-align:left;font-family:inherit;transition:all 0.15s;" onmouseover="this.style.borderColor='#888888';this.style.background='rgba(255,255,255,0.06)'" onmouseout="this.style.borderColor='rgba(255,255,255,0.1)';this.style.background='#111111'">
          <div style="width:34px;height:34px;background:rgba(255,255,255,0.07);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;">
            <svg style="width:16px;height:16px;color:#aaaaaa;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2a1 1 0 01-.293.707L13 13.414V19a1 1 0 01-.553.894l-4 2A1 1 0 017 21v-7.586L3.293 6.707A1 1 0 013 6V4z"/></svg>
          </div>
          <div><div style="font-size:0.875rem;font-weight:600;color:#f0f0f0;">Filtered Results</div><div style="font-size:0.75rem;color:#888888;margin-top:2px;">Export only rows matching current filters.</div></div>
        </button>
        <button id="csv-all" style="display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border:1.5px solid rgba(255,255,255,0.1);border-radius:10px;background:#111111;cursor:pointer;text-align:left;font-family:inherit;transition:all 0.15s;" onmouseover="this.style.borderColor='#888888';this.style.background='rgba(255,255,255,0.06)'" onmouseout="this.style.borderColor='rgba(255,255,255,0.1)';this.style.background='#111111'">
          <div style="width:34px;height:34px;background:rgba(255,255,255,0.05);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;">
            <svg style="width:16px;height:16px;color:#888888;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
          </div>
          <div><div style="font-size:0.875rem;font-weight:600;color:#f0f0f0;">All Logs</div><div style="font-size:0.75rem;color:#888888;margin-top:2px;">Export every audit log entry, ignoring filters.</div></div>
        </button>
      </div>
      <div style="margin-top:16px;">
        <button id="csv-cancel" style="width:100%;padding:9px 16px;font-size:0.875rem;font-weight:600;color:#aaaaaa;background:#111111;border:none;border-radius:8px;cursor:pointer;font-family:inherit;transition:background 0.15s;" onmouseover="this.style.background='rgba(255,255,255,0.06)'" onmouseout="this.style.background='#111111'">Cancel</button>
      </div>
    </div>
  </div>

  <script src="assets/config.js"></script>
  <script src="assets/auth.js"></script>
  <script src="assets/db.js"></script>
  <script src="assets/ui.js"></script>
  <script>
    const PAGE_SIZE = 50;
    const ACTION_CFG = {
      INSERT: { bg:'rgba(255,255,255,0.08)', text:'#dddddd', dot:'#cccccc' },
      UPDATE: { bg:'rgba(255,255,255,0.05)', text:'#aaaaaa', dot:'#999999' },
      DELETE: { bg:'rgba(255,255,255,0.03)', text:'#777777', dot:'#666666' },
    };

    let currentPage = 1, totalCount = 0, activeFilters = {}, allUsers = [];

    async function init() {
      const user = await Auth.guard('admin');
      if (!user) return;
      UI.renderNav(user);
      UI.injectThemeToggle();
      Auth.startSessionTimeout();
      await loadUserDropdown();
      await loadPage();
      attachListeners();
      UI.hideLoader();
    }

    async function loadUserDropdown() {
      try {
        allUsers = await DB.getUsers();
        const sel = document.getElementById('filter-user');
        allUsers.forEach(u => {
          const opt = document.createElement('option');
          opt.value = u.id;
          opt.textContent = u.full_name || u.email;
          sel.appendChild(opt);
        });
      } catch(err) { console.error('User dropdown failed:', err); }
    }

    async function loadPage() {
      setTableLoading();
      try {
        const { data, count } = await DB.getAuditLogFiltered(activeFilters, currentPage, PAGE_SIZE);
        totalCount = count || 0;
        renderTable(data);
        renderPagination();
        renderCount();
      } catch(err) {
        console.error('Audit log failed:', err);
        document.getElementById('audit-tbody').innerHTML =
          `<tr><td colspan="7" style="text-align:center;padding:48px;font-size:0.875rem;color:var(--text-secondary);">Failed to load audit log.</td></tr>`;
      }
    }

    function setTableLoading() {
      document.getElementById('audit-tbody').innerHTML =
        `<tr><td colspan="7" style="text-align:center;padding:48px;font-size:0.875rem;color:#9ca3af;">Loading…</td></tr>`;
    }

    function renderTable(logs) {
      const tbody = document.getElementById('audit-tbody');
      if (!logs || !logs.length) {
        tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:48px;font-size:0.875rem;color:#9ca3af;">No records match your filters.</td></tr>`;
        return;
      }
      tbody.innerHTML = logs.map(l => {
        const name      = l.users?.full_name || l.users?.email || 'Unknown';
        const employee  = l.new_data?.employee_name || l.old_data?.employee_name || '—';
        const oldStatus = l.old_data?.status || '—';
        const newStatus = l.new_data?.status || '—';
        const c         = ACTION_CFG[l.action] || { bg:'#f9fafb', text:'#4b5563', dot:'#9ca3af' };
        const when      = new Date(l.created_at).toLocaleString('en-US', { month:'short', day:'numeric', year:'numeric', hour:'numeric', minute:'2-digit' });
        return `<tr class="tbl-row">
          <td class="tbl-cell" style="color:var(--text-secondary);white-space:nowrap;">${when}</td>
          <td class="tbl-cell" style="color:var(--text-body);">${name}</td>
          <td class="tbl-cell"><span style="display:inline-flex;align-items:center;gap:5px;padding:3px 9px 3px 7px;border-radius:999px;font-size:0.6875rem;font-weight:600;background:${c.bg};color:${c.text};"><span style="width:5px;height:5px;border-radius:50%;background:${c.dot};flex-shrink:0;"></span>${l.action}</span></td>
          <td class="tbl-cell" style="color:#9ca3af;">${l.table_name || '—'}</td>
          <td class="tbl-cell">${employee}</td>
          <td class="tbl-cell" style="color:#9ca3af;">${oldStatus}</td>
          <td class="tbl-cell" style="color:#9ca3af;">${newStatus}</td>
        </tr>`;
      }).join('');
    }

    function renderPagination() {
      const totalPages = Math.max(1, Math.ceil(totalCount / PAGE_SIZE));
      document.getElementById('page-indicator').textContent = `Page ${currentPage} of ${totalPages}`;
      document.getElementById('btn-prev').disabled = currentPage <= 1;
      document.getElementById('btn-next').disabled = currentPage >= totalPages;
    }

    function renderCount() {
      const start = totalCount === 0 ? 0 : (currentPage - 1) * PAGE_SIZE + 1;
      const end   = Math.min(currentPage * PAGE_SIZE, totalCount);
      document.getElementById('result-count').textContent =
        totalCount === 0 ? 'No results' : `Showing ${start}–${end} of ${totalCount} entries`;
    }

    function getFilters() {
      return {
        action:   document.getElementById('filter-action').value    || undefined,
        userId:   document.getElementById('filter-user').value      || undefined,
        dateFrom: document.getElementById('filter-date-from').value || undefined,
        dateTo:   document.getElementById('filter-date-to').value   || undefined,
      };
    }

    function clearFilters() {
      document.getElementById('filter-action').value    = '';
      document.getElementById('filter-user').value      = '';
      document.getElementById('filter-date-from').value = '';
      document.getElementById('filter-date-to').value   = '';
    }

    function logsToCSV(logs) {
      const headers = ['When','User','Action','Table','Record','Old Status','New Status'];
      const escape  = v => `"${String(v ?? '').replace(/"/g,'""')}"`;
      const rows = logs.map(l => [
        new Date(l.created_at).toLocaleString('en-US', { month:'short', day:'numeric', year:'numeric', hour:'numeric', minute:'2-digit' }),
        l.users?.full_name || l.users?.email || 'Unknown',
        l.action, l.table_name || '',
        l.new_data?.employee_name || l.old_data?.employee_name || '',
        l.old_data?.status || '', l.new_data?.status || '',
      ].map(escape).join(','));
      return [headers.map(escape).join(','), ...rows].join('\n');
    }

    function downloadCSV(csv, filename) {
      const blob = new Blob([csv], { type:'text/csv;charset=utf-8;' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href = url; a.download = filename; a.click();
      URL.revokeObjectURL(url);
    }

    async function exportCSV(useFilters) {
      try {
        const filters = useFilters ? activeFilters : {};
        const logs    = await DB.getAuditLogAll(filters);
        const csv     = logsToCSV(logs);
        const tag     = useFilters ? 'filtered' : 'all';
        const date    = new Date().toISOString().split('T')[0];
        downloadCSV(csv, `bgtrack-audit-${tag}-${date}.csv`);
        closeCsvModal();
        UI.toast('CSV downloaded.','success');
      } catch(err) { UI.toast('Export failed. Try again.','error'); console.error(err); }
    }

    function openCsvModal() {
      const m = document.getElementById('csv-modal');
      m.classList.remove('hidden'); m.style.display = 'flex';
    }
    function closeCsvModal() {
      const m = document.getElementById('csv-modal');
      m.classList.add('hidden'); m.style.display = 'none';
    }

    function attachListeners() {
      document.getElementById('btn-apply').addEventListener('click', () => { activeFilters = getFilters(); currentPage = 1; loadPage(); });
      document.getElementById('btn-clear').addEventListener('click', () => { clearFilters(); activeFilters = {}; currentPage = 1; loadPage(); });
      document.getElementById('btn-prev').addEventListener('click', () => { if (currentPage > 1) { currentPage--; loadPage(); } });
      document.getElementById('btn-next').addEventListener('click', () => { const t = Math.ceil(totalCount/PAGE_SIZE); if (currentPage < t) { currentPage++; loadPage(); } });
      document.getElementById('btn-csv').addEventListener('click', openCsvModal);
      document.getElementById('csv-filtered').addEventListener('click', () => exportCSV(true));
      document.getElementById('csv-all').addEventListener('click', () => exportCSV(false));
      document.getElementById('csv-cancel').addEventListener('click', closeCsvModal);
      document.getElementById('csv-modal').addEventListener('click', e => { if (e.target === document.getElementById('csv-modal')) closeCsvModal(); });
    }

    init();
  </script>
</body>
</html>
