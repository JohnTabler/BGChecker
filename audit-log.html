<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BGTrack — Audit Log</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-slate-100 min-h-screen flex">
  <aside id="sidebar" class="w-56 bg-slate-800 flex-shrink-0 flex flex-col min-h-screen fixed top-0 left-0 z-30"></aside>
  <div class="ml-56 flex-1 flex flex-col min-h-screen">
    <header class="bg-white border-b border-gray-200 px-6 py-3 sticky top-0 z-20 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="admin.html" class="inline-flex items-center gap-1.5 text-xs font-medium text-gray-500 hover:text-gray-800 transition-colors">
          <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
          </svg>
          Admin
        </a>
        <span class="text-gray-300">/</span>
        <h1 class="text-base font-semibold text-gray-800">Audit Log</h1>
      </div>
      <div id="profile-area"></div>
    </header>

    <div id="page-loader" class="fixed inset-0 z-50 bg-white flex items-center justify-center">
      <svg class="w-8 h-8 animate-spin text-slate-600" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
      </svg>
    </div>

    <main class="p-6 space-y-4 max-w-6xl">

      <!-- Filters -->
      <div class="bg-white rounded-xl border border-gray-200 shadow-sm px-5 py-4">
        <div class="flex flex-wrap items-end gap-3">

          <!-- Action -->
          <div>
            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Action</label>
            <select id="filter-action" class="px-3 py-2 border border-gray-300 rounded-lg text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-slate-400">
              <option value="">All Actions</option>
              <option value="INSERT">INSERT</option>
              <option value="UPDATE">UPDATE</option>
              <option value="DELETE">DELETE</option>
            </select>
          </div>

          <!-- User -->
          <div>
            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">User</label>
            <select id="filter-user" class="px-3 py-2 border border-gray-300 rounded-lg text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-slate-400">
              <option value="">All Users</option>
            </select>
          </div>

          <!-- Date From -->
          <div>
            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">From</label>
            <input id="filter-date-from" type="date" class="px-3 py-2 border border-gray-300 rounded-lg text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-slate-400"/>
          </div>

          <!-- Date To -->
          <div>
            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">To</label>
            <input id="filter-date-to" type="date" class="px-3 py-2 border border-gray-300 rounded-lg text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-slate-400"/>
          </div>

          <!-- Buttons -->
          <div class="flex items-end gap-2">
            <button id="btn-apply" class="px-4 py-2 text-sm font-medium text-white bg-slate-700 rounded-lg hover:bg-slate-800 transition-colors">Apply</button>
            <button id="btn-clear" class="px-4 py-2 text-sm font-medium text-gray-600 bg-gray-100 rounded-lg hover:bg-gray-200 transition-colors">Clear</button>
          </div>

          <!-- Spacer + CSV -->
          <div class="ml-auto flex items-end">
            <button id="btn-csv" class="inline-flex items-center gap-1.5 px-4 py-2 text-sm font-medium text-slate-700 bg-slate-100 rounded-lg hover:bg-slate-200 transition-colors">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1M12 12v-8m0 8l-3-3m3 3l3-3"/>
              </svg>
              Download CSV
            </button>
          </div>

        </div>
      </div>

      <!-- Results table -->
      <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
        <div class="flex items-center justify-between px-5 py-3.5 border-b border-gray-100 bg-gray-50">
          <span id="result-count" class="text-xs text-gray-500">Loading…</span>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="border-b border-gray-200 bg-gray-50">
                <th class="text-left px-5 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">When</th>
                <th class="text-left px-5 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">User</th>
                <th class="text-left px-5 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Action</th>
                <th class="text-left px-5 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Table</th>
                <th class="text-left px-5 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Record</th>
                <th class="text-left px-5 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Old Status</th>
                <th class="text-left px-5 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">New Status</th>
              </tr>
            </thead>
            <tbody id="audit-tbody" class="divide-y divide-gray-100">
              <tr><td colspan="7" class="text-center py-10 text-gray-400 text-sm">Loading…</td></tr>
            </tbody>
          </table>
        </div>

        <!-- Pagination -->
        <div class="flex items-center justify-between px-5 py-3.5 border-t border-gray-100 bg-gray-50">
          <button id="btn-prev" class="px-3 py-1.5 text-xs font-medium text-gray-600 bg-white border border-gray-200 rounded-lg hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed transition-colors" disabled>← Prev</button>
          <span id="page-indicator" class="text-xs text-gray-500"></span>
          <button id="btn-next" class="px-3 py-1.5 text-xs font-medium text-gray-600 bg-white border border-gray-200 rounded-lg hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed transition-colors" disabled>Next →</button>
        </div>
      </div>

    </main>
  </div>

  <!-- CSV Export Modal -->
  <div id="csv-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/50">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm mx-4 p-6">
      <h3 class="text-base font-semibold text-gray-900 mb-1">Download CSV</h3>
      <p class="text-xs text-gray-500 mb-5">Choose what to include in the export.</p>
      <div class="space-y-3">
        <button id="csv-filtered" class="w-full flex items-start gap-3 px-4 py-3 border-2 border-slate-200 rounded-lg hover:border-slate-400 hover:bg-slate-50 transition-all text-left group">
          <div class="mt-0.5 w-8 h-8 flex-shrink-0 flex items-center justify-center bg-slate-100 rounded-lg group-hover:bg-slate-200 transition-colors">
            <svg class="w-4 h-4 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2a1 1 0 01-.293.707L13 13.414V19a1 1 0 01-.553.894l-4 2A1 1 0 017 21v-7.586L3.293 6.707A1 1 0 013 6V4z"/>
            </svg>
          </div>
          <div>
            <div class="text-sm font-medium text-gray-900">Filtered Results</div>
            <div class="text-xs text-gray-500 mt-0.5">Export only the rows matching your current filters.</div>
          </div>
        </button>
        <button id="csv-all" class="w-full flex items-start gap-3 px-4 py-3 border-2 border-slate-200 rounded-lg hover:border-slate-400 hover:bg-slate-50 transition-all text-left group">
          <div class="mt-0.5 w-8 h-8 flex-shrink-0 flex items-center justify-center bg-slate-100 rounded-lg group-hover:bg-slate-200 transition-colors">
            <svg class="w-4 h-4 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 10h16M4 14h16M4 18h16"/>
            </svg>
          </div>
          <div>
            <div class="text-sm font-medium text-gray-900">All Logs</div>
            <div class="text-xs text-gray-500 mt-0.5">Export every audit log entry, ignoring filters.</div>
          </div>
        </button>
      </div>
      <div class="flex gap-3 mt-5">
        <button id="csv-cancel" class="flex-1 px-4 py-2 text-sm font-medium text-gray-700 bg-gray-100 rounded-lg hover:bg-gray-200 transition-colors">Cancel</button>
      </div>
    </div>
  </div>

  <script src="assets/config.js"></script>
  <script src="assets/auth.js"></script>
  <script src="assets/db.js"></script>
  <script src="assets/ui.js"></script>
  <script>
    const PAGE_SIZE = 50;
    const ACTION_COLORS = {
      INSERT: 'bg-emerald-100 text-emerald-800',
      UPDATE: 'bg-blue-100 text-blue-800',
      DELETE: 'bg-red-100 text-red-800',
    };

    let currentPage  = 1;
    let totalCount   = 0;
    let activeFilters = {};
    let allUsers     = []; // for user dropdown

    // ── Init ────────────────────────────────────────────────
    async function init() {
      const user = await Auth.guard('admin');
      if (!user) return;
      UI.renderNav(user);
      Auth.startSessionTimeout();
      await loadUserDropdown();
      await loadPage();
      attachListeners();
      UI.hideLoader();
    }

    // ── User dropdown ────────────────────────────────────────
    async function loadUserDropdown() {
      try {
        allUsers = await DB.getUsers();
        const sel = document.getElementById('filter-user');
        allUsers.forEach(u => {
          const opt = document.createElement('option');
          opt.value = u.id;
          opt.textContent = u.full_name || u.email;
          sel.appendChild(opt);
        });
      } catch(err) { console.error('User dropdown failed:', err); }
    }

    // ── Load page ────────────────────────────────────────────
    async function loadPage() {
      setTableLoading();
      try {
        const { data, count } = await DB.getAuditLogFiltered(activeFilters, currentPage, PAGE_SIZE);
        totalCount = count || 0;
        renderTable(data);
        renderPagination();
        renderCount();
      } catch(err) {
        console.error('Audit log failed:', err);
        document.getElementById('audit-tbody').innerHTML =
          `<tr><td colspan="7" class="text-center py-10 text-red-400 text-sm">Failed to load audit log.</td></tr>`;
      }
    }

    function setTableLoading() {
      document.getElementById('audit-tbody').innerHTML =
        `<tr><td colspan="7" class="text-center py-10 text-gray-400 text-sm">Loading…</td></tr>`;
    }

    // ── Render table ─────────────────────────────────────────
    function renderTable(logs) {
      const tbody = document.getElementById('audit-tbody');
      if (!logs || !logs.length) {
        tbody.innerHTML = `<tr><td colspan="7" class="text-center py-10 text-gray-400 text-sm">No records match your filters.</td></tr>`;
        return;
      }
      tbody.innerHTML = logs.map(l => {
        const name       = l.users?.full_name || l.users?.email || 'Unknown';
        const employee   = l.new_data?.employee_name || l.old_data?.employee_name || '—';
        const oldStatus  = l.old_data?.status || '—';
        const newStatus  = l.new_data?.status || '—';
        const cls        = ACTION_COLORS[l.action] || 'bg-gray-100 text-gray-600';
        const when       = new Date(l.created_at).toLocaleString('en-US', {
          month: 'short', day: 'numeric', year: 'numeric',
          hour: 'numeric', minute: '2-digit'
        });
        return `<tr class="hover:bg-slate-50 transition-colors">
          <td class="px-5 py-3 text-xs text-gray-500 whitespace-nowrap">${when}</td>
          <td class="px-5 py-3 text-xs text-gray-700">${name}</td>
          <td class="px-5 py-3">
            <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium ${cls}">${l.action}</span>
          </td>
          <td class="px-5 py-3 text-xs text-gray-500">${l.table_name || '—'}</td>
          <td class="px-5 py-3 text-xs text-gray-700">${employee}</td>
          <td class="px-5 py-3 text-xs text-gray-500">${oldStatus}</td>
          <td class="px-5 py-3 text-xs text-gray-500">${newStatus}</td>
        </tr>`;
      }).join('');
    }

    // ── Pagination ───────────────────────────────────────────
    function renderPagination() {
      const totalPages = Math.max(1, Math.ceil(totalCount / PAGE_SIZE));
      document.getElementById('page-indicator').textContent = `Page ${currentPage} of ${totalPages}`;
      document.getElementById('btn-prev').disabled = currentPage <= 1;
      document.getElementById('btn-next').disabled = currentPage >= totalPages;
    }

    function renderCount() {
      const start = totalCount === 0 ? 0 : (currentPage - 1) * PAGE_SIZE + 1;
      const end   = Math.min(currentPage * PAGE_SIZE, totalCount);
      document.getElementById('result-count').textContent =
        totalCount === 0 ? 'No results' : `Showing ${start}–${end} of ${totalCount} entries`;
    }

    // ── Filters ──────────────────────────────────────────────
    function getFilters() {
      return {
        action:   document.getElementById('filter-action').value   || undefined,
        userId:   document.getElementById('filter-user').value     || undefined,
        dateFrom: document.getElementById('filter-date-from').value || undefined,
        dateTo:   document.getElementById('filter-date-to').value   || undefined,
      };
    }

    function clearFilters() {
      document.getElementById('filter-action').value    = '';
      document.getElementById('filter-user').value      = '';
      document.getElementById('filter-date-from').value = '';
      document.getElementById('filter-date-to').value   = '';
    }

    // ── CSV export ───────────────────────────────────────────
    function logsToCSV(logs) {
      const headers = ['When', 'User', 'Action', 'Table', 'Record', 'Old Status', 'New Status'];
      const escape  = v => `"${String(v ?? '').replace(/"/g, '""')}"`;
      const rows = logs.map(l => [
        new Date(l.created_at).toLocaleString('en-US', {
          month: 'short', day: 'numeric', year: 'numeric',
          hour: 'numeric', minute: '2-digit'
        }),
        l.users?.full_name || l.users?.email || 'Unknown',
        l.action,
        l.table_name || '',
        l.new_data?.employee_name || l.old_data?.employee_name || '',
        l.old_data?.status || '',
        l.new_data?.status || '',
      ].map(escape).join(','));
      return [headers.map(escape).join(','), ...rows].join('\n');
    }

    function downloadCSV(csv, filename) {
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    async function exportCSV(useFilters) {
      const btn = useFilters ? document.getElementById('csv-filtered') : document.getElementById('csv-all');
      const originalHTML = btn.innerHTML;
      btn.innerHTML = btn.innerHTML.replace(/<div class="text-sm font-medium.*?<\/div>/, '<div class="text-sm font-medium text-gray-900">Exporting…</div>');
      btn.disabled  = true;

      try {
        const filters = useFilters ? activeFilters : {};
        const logs    = await DB.getAuditLogAll(filters);
        const csv     = logsToCSV(logs);
        const tag     = useFilters ? 'filtered' : 'all';
        const date    = new Date().toISOString().split('T')[0];
        downloadCSV(csv, `bgtrack-audit-${tag}-${date}.csv`);
        closeCsvModal();
        UI.toast('CSV downloaded.', 'success');
      } catch(err) {
        UI.toast('Export failed. Try again.', 'error');
        console.error(err);
      } finally {
        btn.innerHTML = originalHTML;
        btn.disabled  = false;
      }
    }

    // ── Modal helpers ─────────────────────────────────────────
    function openCsvModal()  { document.getElementById('csv-modal').classList.remove('hidden'); }
    function closeCsvModal() { document.getElementById('csv-modal').classList.add('hidden'); }

    // ── Event listeners ───────────────────────────────────────
    function attachListeners() {
      document.getElementById('btn-apply').addEventListener('click', () => {
        activeFilters = getFilters();
        currentPage   = 1;
        loadPage();
      });

      document.getElementById('btn-clear').addEventListener('click', () => {
        clearFilters();
        activeFilters = {};
        currentPage   = 1;
        loadPage();
      });

      document.getElementById('btn-prev').addEventListener('click', () => {
        if (currentPage > 1) { currentPage--; loadPage(); }
      });

      document.getElementById('btn-next').addEventListener('click', () => {
        const totalPages = Math.ceil(totalCount / PAGE_SIZE);
        if (currentPage < totalPages) { currentPage++; loadPage(); }
      });

      document.getElementById('btn-csv').addEventListener('click', openCsvModal);

      document.getElementById('csv-filtered').addEventListener('click', () => exportCSV(true));
      document.getElementById('csv-all').addEventListener('click', () => exportCSV(false));
      document.getElementById('csv-cancel').addEventListener('click', closeCsvModal);

      document.getElementById('csv-modal').addEventListener('click', e => {
        if (e.target === document.getElementById('csv-modal')) closeCsvModal();
      });
    }

    init();
  </script>
</body>
</html>
