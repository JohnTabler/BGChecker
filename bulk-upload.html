<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BGTrack — Bulk Upload</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body{font-family:'Inter',sans-serif;}
    .cell-input{width:100%;padding:0.25rem 0.5rem;font-size:0.75rem;border:1px solid transparent;border-radius:0.375rem;outline:none;background:transparent;}
    .cell-input:focus{border-color:#475569;background:white;}
    .cell-input.field-error{border-color:#f87171!important;background:#fef2f2!important;}
  </style>
</head>
<body class="bg-slate-100 min-h-screen flex">
  <aside id="sidebar" class="w-56 bg-slate-800 flex-shrink-0 flex flex-col min-h-screen fixed top-0 left-0 z-30"></aside>
  <div class="ml-56 flex-1 flex flex-col min-h-screen">
    <header class="bg-white border-b border-gray-200 px-6 py-3 flex items-center gap-2 sticky top-0 z-20">
      <a href="records.html" class="text-gray-400 hover:text-blue-600 text-sm transition-colors">Records</a>
      <span class="text-gray-300 text-sm">›</span>
      <span class="text-gray-700 font-medium text-sm">Bulk Upload</span>
    </header>

    <div id="page-loader" class="fixed inset-0 z-50 bg-white flex items-center justify-center">
      <svg class="w-8 h-8 animate-spin text-slate-600" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
      </svg>
    </div>

    <main class="p-6 space-y-5">

      <!-- Step 1 -->
      <div id="step-upload" class="bg-white rounded-xl border border-gray-200 shadow-sm p-6">
        <div class="flex items-start justify-between mb-5">
          <div>
            <h2 class="text-sm font-semibold text-gray-900">Step 1 — Upload CSV</h2>
            <p class="text-xs text-gray-500 mt-0.5">Download the template, fill it in, then upload here.</p>
          </div>
          <button id="download-template" class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-slate-700 border border-slate-300 rounded-lg hover:bg-slate-50 transition-colors">⬇ Download Template</button>
        </div>
        <label id="drop-zone" class="flex flex-col items-center justify-center w-full h-36 border-2 border-dashed border-gray-300 rounded-xl cursor-pointer hover:border-slate-400 hover:bg-slate-50/50 transition-colors">
          <span class="text-2xl mb-1">📂</span>
          <p class="text-sm font-medium text-gray-600">Drop CSV here or <span class="text-blue-600">browse</span></p>
          <p class="text-xs text-gray-400 mt-0.5">CSV only · Max 5 MB</p>
          <input id="file-input" type="file" accept=".csv" class="hidden" />
        </label>
        <div id="upload-error" class="hidden mt-3 px-4 py-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700"></div>
      </div>

      <!-- Step 2 preview -->
      <div id="step-preview" class="hidden space-y-4">
        <div class="flex flex-wrap items-center gap-3">
          <div class="flex items-center gap-2 px-3 py-1.5 bg-emerald-50 border border-emerald-200 rounded-lg">
            <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
            <span class="text-xs font-medium text-emerald-800"><span id="valid-count">0</span> valid</span>
          </div>
          <div class="flex items-center gap-2 px-3 py-1.5 bg-red-50 border border-red-200 rounded-lg">
            <span class="w-2 h-2 rounded-full bg-red-500"></span>
            <span class="text-xs font-medium text-red-800"><span id="error-count">0</span> need attention</span>
          </div>
          <p class="text-xs text-gray-400">Fix errors inline. Red fields are required or invalid.</p>
        </div>

        <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead>
                <tr class="border-b border-gray-200 bg-gray-50">
                  <th class="w-8 px-3 py-2.5 text-xs font-semibold text-gray-400">#</th>
                  <th class="text-left px-3 py-2.5 text-xs font-semibold text-gray-500 uppercase tracking-wider">Employee *</th>
                  <th class="text-left px-3 py-2.5 text-xs font-semibold text-gray-500 uppercase tracking-wider">Project *</th>
                  <th class="text-left px-3 py-2.5 text-xs font-semibold text-gray-500 uppercase tracking-wider">Date Ordered *</th>
                  <th class="text-left px-3 py-2.5 text-xs font-semibold text-gray-500 uppercase tracking-wider">Date Processed</th>
                  <th class="text-left px-3 py-2.5 text-xs font-semibold text-gray-500 uppercase tracking-wider">Vendor</th>
                  <th class="text-left px-3 py-2.5 text-xs font-semibold text-gray-500 uppercase tracking-wider">Status *</th>
                  <th class="text-left px-3 py-2.5 text-xs font-semibold text-gray-500 uppercase tracking-wider">Expiration</th>
                  <th class="w-8 px-3 py-2.5"></th>
                </tr>
              </thead>
              <tbody id="preview-tbody" class="divide-y divide-gray-100"></tbody>
            </table>
          </div>
        </div>

        <div class="flex items-center justify-between">
          <button id="reupload-btn" class="px-4 py-2 text-xs font-medium text-gray-600 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">← Upload different file</button>
          <div class="flex items-center gap-3">
            <p id="import-note" class="text-xs text-gray-400"></p>
            <button id="import-btn" class="px-5 py-2 text-xs font-medium text-white bg-slate-700 rounded-lg hover:bg-slate-800 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">Import Records</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="assets/config.js"></script>
  <script src="assets/auth.js"></script>
  <script src="assets/db.js"></script>
  <script src="assets/ui.js"></script>
  <script>
    let currentUser=null, parsedRows=[];
    const VALID_STATUSES=['Pending','Cleared','Failed','Cancelled'];
    const DATE_RE=/^\d{4}-\d{2}-\d{2}$/;

    async function init() {
      currentUser = await Auth.guard('manager');
      if (!currentUser) return;
      UI.renderNav(currentUser);
      Auth.startSessionTimeout();
      attachListeners();
      UI.hideLoader();
    }

    document.getElementById('download-template').addEventListener('click', () => {
      const csv=['employee_name,project,date_ordered,date_processed,vendor,status','Jane Smith,Project Alpha,2026-01-10,2026-01-15,HireRight,Cleared','John Doe,Project Beta,2026-02-01,,Sterling,Pending'].join('\r\n');
      const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download='bgtrack-template.csv'; a.click();
    });

    function attachListeners() {
      const zone=document.getElementById('drop-zone'), input=document.getElementById('file-input');
      zone.addEventListener('click', ()=>input.click());
      input.addEventListener('change', e=>handleFile(e.target.files[0]));
      zone.addEventListener('dragover', e=>{e.preventDefault(); zone.classList.add('border-slate-400','bg-slate-50/50');});
      zone.addEventListener('dragleave', ()=>zone.classList.remove('border-slate-400','bg-slate-50/50'));
      zone.addEventListener('drop', e=>{e.preventDefault(); zone.classList.remove('border-slate-400','bg-slate-50/50'); handleFile(e.dataTransfer.files[0]);});
      document.getElementById('reupload-btn').addEventListener('click', ()=>{
        document.getElementById('step-preview').classList.add('hidden');
        document.getElementById('step-upload').classList.remove('hidden');
        document.getElementById('file-input').value=''; parsedRows=[];
      });
      document.getElementById('import-btn').addEventListener('click', importRecords);
    }

    function handleFile(file) {
      const errEl=document.getElementById('upload-error'); errEl.classList.add('hidden');
      if (!file) return;
      if (!file.name.endsWith('.csv')) { errEl.textContent='Please upload a .csv file.'; errEl.classList.remove('hidden'); return; }
      if (file.size>5*1024*1024) { errEl.textContent='File exceeds 5 MB.'; errEl.classList.remove('hidden'); return; }
      const reader=new FileReader();
      reader.onload=e=>{
        const lines=e.target.result.split(/\r?\n/).filter(l=>l.trim());
        if (lines.length<2) { errEl.textContent='File appears empty.'; errEl.classList.remove('hidden'); return; }
        const headers=lines[0].split(',').map(h=>h.trim().toLowerCase().replace(/\s+/g,'_'));
        parsedRows=lines.slice(1).map((line,i)=>{
          const values=parseCSVLine(line); const row={};
          headers.forEach((h,idx)=>row[h]=(values[idx]||'').trim());
          row._index=i+2; return row;
        }).filter(r=>Object.values(r).some(v=>v&&v!==String(r._index)));
        renderPreview();
        document.getElementById('step-upload').classList.add('hidden');
        document.getElementById('step-preview').classList.remove('hidden');
      };
      reader.readAsText(file);
    }

    function parseCSVLine(line) {
      const result=[]; let current='',inQuotes=false;
      for (let i=0;i<line.length;i++) {
        if(line[i]==='"') inQuotes=!inQuotes;
        else if(line[i]===','&&!inQuotes){result.push(current);current='';}
        else current+=line[i];
      }
      result.push(current); return result;
    }

    function validateRow(row) {
      const errors={};
      if(!row.employee_name) errors.employee_name='Required';
      if(!row.project) errors.project='Required';
      if(!row.date_ordered) errors.date_ordered='Required';
      else if(!DATE_RE.test(row.date_ordered)) errors.date_ordered='Use YYYY-MM-DD';
      if(row.date_processed&&!DATE_RE.test(row.date_processed)) errors.date_processed='Use YYYY-MM-DD';
      if(!row.status) errors.status='Required';
      else if(!VALID_STATUSES.includes(row.status)) errors.status=`Must be: ${VALID_STATUSES.join(', ')}`;
      return errors;
    }

    function computeExpiration(dp) {
      if(!dp||!DATE_RE.test(dp)) return '';
      const d=new Date(dp); d.setMonth(d.getMonth()+6); return d.toISOString().split('T')[0];
    }

    function renderPreview() {
      const tbody=document.getElementById('preview-tbody');
      let v=0,err=0;
      tbody.innerHTML=parsedRows.map((row,rowIdx)=>{
        const errors=validateRow(row); const hasError=Object.keys(errors).length>0;
        if(hasError) err++; else v++;
        const exp=computeExpiration(row.date_processed);
        return `
          <tr class="${hasError?'bg-red-50/40':''}" data-row="${rowIdx}">
            <td class="px-3 py-2 text-xs text-gray-400">${row._index}</td>
            ${editableCell(rowIdx,'employee_name',row.employee_name,errors.employee_name)}
            ${editableCell(rowIdx,'project',row.project,errors.project)}
            ${editableCell(rowIdx,'date_ordered',row.date_ordered,errors.date_ordered,'date')}
            ${editableCell(rowIdx,'date_processed',row.date_processed,errors.date_processed,'date')}
            ${editableCell(rowIdx,'vendor',row.vendor,null)}
            ${statusCell(rowIdx,row.status,errors.status)}
            <td class="px-3 py-2 text-xs text-gray-500" id="exp-${rowIdx}">${exp||'—'}</td>
            <td class="px-3 py-2"><button onclick="removeRow(${rowIdx})" class="text-gray-300 hover:text-red-400 transition-colors" title="Remove">✕</button></td>
          </tr>
          ${hasError?`<tr data-row-err="${rowIdx}" class="bg-red-50/40"><td></td><td colspan="8" class="px-3 pb-1.5"><p class="text-xs text-red-600">${Object.entries(errors).map(([f,m])=>`<b>${f.replace(/_/g,' ')}:</b> ${m}`).join(' · ')}</p></td></tr>`:''}`;
      }).join('');
      updateCounts(v,err);
      document.querySelectorAll('[data-row][data-field]').forEach(el=>el.addEventListener('change',handleCellChange));
    }

    function editableCell(rowIdx,field,value,errMsg,inputType='text') {
      return `<td class="px-1 py-1"><input type="${inputType}" data-row="${rowIdx}" data-field="${field}" class="cell-input${errMsg?' field-error':''}" value="${(value||'').replace(/"/g,'&quot;')}" /></td>`;
    }
    function statusCell(rowIdx,value,errMsg) {
      const opts=['',...VALID_STATUSES].map(s=>`<option value="${s}" ${s===value?'selected':''}>${s||'Select…'}</option>`).join('');
      return `<td class="px-1 py-1"><select data-row="${rowIdx}" data-field="status" class="cell-input${errMsg?' field-error':''}">${opts}</select></td>`;
    }

    function handleCellChange(e) {
      const rowIdx=parseInt(e.target.dataset.row), field=e.target.dataset.field;
      parsedRows[rowIdx][field]=e.target.value.trim();
      if(field==='date_processed') { const expEl=document.getElementById(`exp-${rowIdx}`); if(expEl) expEl.textContent=computeExpiration(parsedRows[rowIdx].date_processed)||'—'; }
      const errors=validateRow(parsedRows[rowIdx]); const hasError=Object.keys(errors).length>0;
      const tr=document.querySelector(`tr[data-row="${rowIdx}"]`); if(tr) tr.className=hasError?'bg-red-50/40':'';
      const errTr=document.querySelector(`tr[data-row-err="${rowIdx}"]`);
      if(errTr) errTr.innerHTML=hasError?`<td></td><td colspan="8" class="px-3 pb-1.5"><p class="text-xs text-red-600">${Object.entries(errors).map(([f,m])=>`<b>${f.replace(/_/g,' ')}:</b> ${m}`).join(' · ')}</p></td>`:'<td></td><td colspan="8"></td>';
      e.target.className=errors[field]?'cell-input field-error':'cell-input';
      let v=0,err=0; parsedRows.forEach(r=>Object.keys(validateRow(r)).length>0?err++:v++);
      updateCounts(v,err);
    }

    function removeRow(rowIdx) { parsedRows.splice(rowIdx,1); renderPreview(); }

    function updateCounts(valid,errors) {
      document.getElementById('valid-count').textContent=valid;
      document.getElementById('error-count').textContent=errors;
      const btn=document.getElementById('import-btn');
      if(errors>0){btn.textContent='Import Valid Records';document.getElementById('import-note').textContent=`${errors} row${errors>1?'s':''} with errors will be skipped.`;btn.disabled=valid===0;}
      else{btn.textContent=`Import ${valid} Record${valid!==1?'s':''}`;document.getElementById('import-note').textContent='';btn.disabled=valid===0;}
    }

    async function importRecords() {
      const toImport=parsedRows.filter(r=>Object.keys(validateRow(r)).length===0);
      if(!toImport.length){UI.toast('No valid records to import.','warning');return;}
      const btn=document.getElementById('import-btn'); btn.textContent='Importing…'; btn.disabled=true;
      try {
        const result=await DB.bulkCreateRecords(toImport.map(r=>({employee_name:r.employee_name,project:r.project,date_ordered:r.date_ordered,date_processed:r.date_processed||null,vendor:r.vendor||null,status:r.status})));
        UI.toast(`${result.length} record${result.length!==1?'s':''} imported.`,'success');
        window.location.href='records.html';
      } catch(err) { UI.toast('Import failed: '+(err.message||'Unknown error'),'error'); btn.textContent='Import Records'; btn.disabled=false; console.error(err); }
    }
    init();
  </script>
</body>
</html>
