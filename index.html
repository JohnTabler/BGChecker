<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BGTrack — Sign In</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
    .form-input {
      width: 100%;
      padding: 10px 13px;
      border: 1.5px solid #e5e3de;
      border-radius: 8px;
      font-size: 0.9375rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      background: #fff;
      color: #111827;
    }
    .form-input:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
    }
    .form-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
      letter-spacing: 0.005em;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 0.9s linear infinite; }

    /* Brand panel background pattern */
    .brand-panel {
      background: #0e1a33;
      background-image:
        radial-gradient(ellipse 80% 60% at 20% 120%, rgba(79,70,229,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% -20%, rgba(99,102,241,0.12) 0%, transparent 60%);
    }
  </style>
</head>
<body class="min-h-screen flex">

  <!-- Left brand panel -->
  <div class="brand-panel hidden lg:flex flex-col justify-between flex-shrink-0 p-10" style="width:42%;">

    <!-- Logo -->
    <div class="flex items-center gap-3">
      <div style="width:36px;height:36px;background:#4f46e5;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <svg style="width:20px;height:20px;" fill="none" stroke="white" viewBox="0 0 24 24" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
        </svg>
      </div>
      <span style="color:#fff;font-weight:800;font-size:1.0625rem;letter-spacing:-0.025em;">BGTrack</span>
    </div>

    <!-- Headline -->
    <div>
      <h2 style="color:#fff;font-size:2.125rem;font-weight:800;line-height:1.12;letter-spacing:-0.04em;margin:0 0 14px;">Background<br>screening,<br>simplified.</h2>
      <p style="color:#6d8fba;font-size:0.9375rem;line-height:1.65;max-width:300px;margin:0 0 28px;">Track clearances, monitor expirations, and manage your team's compliance — all in one place.</p>

      <div style="display:flex;flex-direction:column;gap:10px;">
        <div class="flex items-center gap-2.5" style="color:#4d6e8e;">
          <div style="width:22px;height:22px;border-radius:6px;background:rgba(79,70,229,0.25);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <svg style="width:12px;height:12px;color:#a5b4fc;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
          </div>
          <span style="font-size:0.8125rem;font-weight:500;">Expiration tracking &amp; reminders</span>
        </div>
        <div class="flex items-center gap-2.5" style="color:#4d6e8e;">
          <div style="width:22px;height:22px;border-radius:6px;background:rgba(79,70,229,0.25);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <svg style="width:12px;height:12px;color:#a5b4fc;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
          </div>
          <span style="font-size:0.8125rem;font-weight:500;">Role-based access control</span>
        </div>
        <div class="flex items-center gap-2.5" style="color:#4d6e8e;">
          <div style="width:22px;height:22px;border-radius:6px;background:rgba(79,70,229,0.25);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <svg style="width:12px;height:12px;color:#a5b4fc;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
          </div>
          <span style="font-size:0.8125rem;font-weight:500;">CSV bulk import &amp; export</span>
        </div>
      </div>
    </div>

    <p style="color:#223450;font-size:0.75rem;font-weight:500;">© 2026 BGTrack</p>
  </div>

  <!-- Right form panel -->
  <div class="flex-1 flex items-center justify-center p-8" style="background:#ffffff;">
    <div style="width:100%;max-width:360px;">

      <!-- Mobile logo -->
      <div class="flex lg:hidden items-center gap-2.5 mb-8 justify-center">
        <div style="width:34px;height:34px;background:#4f46e5;border-radius:9px;display:flex;align-items:center;justify-content:center;">
          <svg style="width:19px;height:19px;" fill="none" stroke="white" viewBox="0 0 24 24" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
          </svg>
        </div>
        <span style="font-weight:800;font-size:1.0625rem;color:#111827;letter-spacing:-0.025em;">BGTrack</span>
      </div>

      <h1 style="font-size:1.625rem;font-weight:800;color:#111827;letter-spacing:-0.03em;margin:0 0 5px;">Welcome back</h1>
      <p style="font-size:0.9375rem;color:#6b7280;margin:0 0 26px;line-height:1.5;">Sign in to your workspace.</p>

      <div id="error-msg" class="hidden" style="margin-bottom:16px;padding:11px 13px;background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;">
        <p style="font-size:0.875rem;color:#dc2626;font-weight:500;margin:0;" id="error-text"></p>
      </div>

      <div style="display:flex;flex-direction:column;gap:15px;">
        <div>
          <label class="form-label" for="email">Email address</label>
          <input id="email" type="email" autocomplete="email" class="form-input" placeholder="you@company.com" />
        </div>
        <div>
          <label class="form-label" for="password">Password</label>
          <input id="password" type="password" autocomplete="current-password" class="form-input" placeholder="••••••••" />
        </div>
        <button id="sign-in-btn" style="width:100%;padding:11px 16px;background:#4f46e5;color:#fff;font-size:0.9375rem;font-weight:700;border:none;border-radius:9px;cursor:pointer;transition:background 0.15s;display:flex;align-items:center;justify-content:center;gap:8px;letter-spacing:-0.01em;font-family:inherit;margin-top:2px;" onmouseover="if(!this.disabled)this.style.background='#4338ca'" onmouseout="if(!this.disabled)this.style.background='#4f46e5'">
          <span id="btn-text">Sign in</span>
          <svg id="btn-spinner" class="hidden spin" style="width:17px;height:17px;" fill="none" viewBox="0 0 24 24">
            <circle style="opacity:0.25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path style="opacity:0.75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
          </svg>
        </button>
      </div>

    </div>
  </div>

  <script src="assets/config.js"></script>
  <script src="assets/auth.js"></script>
  <script>
    (async () => { const u = await Auth.getUser(); if (u) window.location.href = 'dashboard.html'; })();

    if (new URLSearchParams(window.location.search).get('reason') === 'timeout') {
      document.getElementById('error-text').textContent = 'You were signed out due to inactivity.';
      document.getElementById('error-msg').classList.remove('hidden');
    }

    document.getElementById('sign-in-btn').addEventListener('click', async () => {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errDiv   = document.getElementById('error-msg');
      errDiv.classList.add('hidden');
      if (!email || !password) {
        document.getElementById('error-text').textContent = 'Please enter your email and password.';
        errDiv.classList.remove('hidden'); return;
      }
      document.getElementById('btn-text').textContent = 'Signing in…';
      document.getElementById('btn-spinner').classList.remove('hidden');
      document.getElementById('sign-in-btn').disabled = true;
      try {
        await Auth.signIn(email, password);
        window.location.href = 'dashboard.html';
      } catch (err) {
        document.getElementById('error-text').textContent = err.message || 'Invalid email or password.';
        errDiv.classList.remove('hidden');
      } finally {
        document.getElementById('btn-text').textContent = 'Sign in';
        document.getElementById('btn-spinner').classList.add('hidden');
        document.getElementById('sign-in-btn').disabled = false;
      }
    });
    document.addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('sign-in-btn').click(); });
  </script>
</body>
</html>
