<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BGTrack — Sign In</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <div class="flex items-center justify-center gap-2.5 mb-8">
      <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618
               3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03
               9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
        </svg>
      </div>
      <span class="text-white font-bold text-2xl tracking-tight">BGTrack</span>
    </div>

    <div class="bg-white rounded-2xl shadow-2xl p-8">
      <h1 class="text-xl font-semibold text-gray-900 mb-1">Sign in</h1>
      <p class="text-sm text-gray-500 mb-6">Enter your credentials to continue.</p>

      <div id="error-msg" class="hidden mb-4 px-4 py-3 bg-red-50 border border-red-200 rounded-lg">
        <p class="text-sm text-red-700" id="error-text"></p>
      </div>

      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Email</label>
          <input id="email" type="email" autocomplete="email"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-slate-500 focus:border-transparent"
            placeholder="you@company.com" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
          <input id="password" type="password" autocomplete="current-password"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-slate-500 focus:border-transparent"
            placeholder="••••••••" />
        </div>
        <button id="sign-in-btn"
          class="w-full bg-slate-800 hover:bg-slate-900 text-white font-medium py-2.5 px-4 rounded-lg text-sm transition-colors flex items-center justify-center gap-2">
          <span id="btn-text">Sign in</span>
          <svg id="btn-spinner" class="hidden w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script src="assets/config.js"></script>
  <script src="assets/auth.js"></script>
  <script>
    (async () => { const u = await Auth.getUser(); if (u) window.location.href = 'dashboard.html'; })();
    // Show message if redirected due to inactivity
    if (new URLSearchParams(window.location.search).get('reason') === 'timeout') {
      document.getElementById('error-text').textContent = 'You were signed out due to inactivity.';
      document.getElementById('error-msg').classList.remove('hidden');
    }

    document.getElementById('sign-in-btn').addEventListener('click', async () => {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errDiv   = document.getElementById('error-msg');
      errDiv.classList.add('hidden');
      if (!email || !password) {
        document.getElementById('error-text').textContent = 'Please enter your email and password.';
        errDiv.classList.remove('hidden'); return;
      }
      document.getElementById('btn-text').textContent = 'Signing in…';
      document.getElementById('btn-spinner').classList.remove('hidden');
      document.getElementById('sign-in-btn').disabled = true;
      try {
        await Auth.signIn(email, password);
        window.location.href = 'dashboard.html';
      } catch (err) {
        document.getElementById('error-text').textContent = err.message || 'Invalid email or password.';
        errDiv.classList.remove('hidden');
      } finally {
        document.getElementById('btn-text').textContent = 'Sign in';
        document.getElementById('btn-spinner').classList.add('hidden');
        document.getElementById('sign-in-btn').disabled = false;
      }
    });
    document.addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('sign-in-btn').click(); });
  </script>
</body>
</html>
