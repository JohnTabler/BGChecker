<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BGTrack — Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f0efe9; }
    .page-header { background: #fff; border-bottom: 1px solid #e5e3de; padding: 0 24px; height: 52px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 20; }
    .page-title  { font-size: 0.9375rem; font-weight: 700; color: #111827; letter-spacing: -0.02em; }
    .card        { background: #fff; border: 1px solid #e5e3de; border-radius: 12px; }
    .card-header { padding: 14px 18px; border-bottom: 1px solid #f0ede8; display: flex; align-items: center; justify-content: space-between; }
    .card-title  { font-size: 0.875rem; font-weight: 700; color: #111827; letter-spacing: -0.015em; }
    .card-sub    { font-size: 0.75rem; color: #9ca3af; margin-top: 2px; }
    .view-link   { font-size: 0.75rem; font-weight: 600; color: #4f46e5; text-decoration: none; letter-spacing: -0.01em; }
    .view-link:hover { color: #4338ca; }
    .list-row    { display: flex; align-items: center; justify-content: space-between; padding: 11px 18px; border-bottom: 1px solid #f5f4f1; transition: background 0.1s; text-decoration: none; }
    .list-row:last-child { border-bottom: none; }
    .list-row:hover { background: #f9f8f5; }
    .row-name    { font-size: 0.875rem; font-weight: 600; color: #111827; letter-spacing: -0.01em; }
    .row-sub     { font-size: 0.75rem; color: #9ca3af; margin-top: 1px; }
    .stat-icon   { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  </style>
</head>
<body>

  <aside id="sidebar" class="w-56 flex-shrink-0 flex flex-col min-h-screen fixed top-0 left-0 z-30" style="background:#0e1a33;"></aside>

  <div class="ml-56 flex flex-col min-h-screen">
    <header class="page-header">
      <h1 class="page-title">Dashboard</h1>
      <div id="profile-area"></div>
    </header>

    <div id="page-loader" class="fixed inset-0 z-50 bg-white flex items-center justify-center">
      <svg class="w-8 h-8" style="animation:spin 0.9s linear infinite;color:#4f46e5;" fill="none" viewBox="0 0 24 24">
        <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
        <circle style="opacity:.2" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
        <path style="opacity:.8" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
      </svg>
    </div>

    <main style="padding:22px 24px;display:flex;flex-direction:column;gap:20px;">

      <!-- Stat cards -->
      <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">

        <div class="card" style="padding:18px;">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;">
            <p style="font-size:0.6875rem;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:0.07em;">Total Records</p>
            <div class="stat-icon" style="background:#f0efe9;">
              <svg style="width:18px;height:18px;color:#6b7280;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20H5a2 2 0 01-2-2V6a2 2 0 012-2h7l5 5v9a2 2 0 01-2 2z"/><path stroke-linecap="round" stroke-linejoin="round" d="M17 8h-5V3"/></svg>
            </div>
          </div>
          <p id="stat-total" style="font-size:2rem;font-weight:800;color:#111827;letter-spacing:-0.04em;line-height:1;">—</p>
        </div>

        <div class="card" style="padding:18px;">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;">
            <p style="font-size:0.6875rem;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:0.07em;">Cleared</p>
            <div class="stat-icon" style="background:#ecfdf5;">
              <svg style="width:18px;height:18px;color:#10b981;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            </div>
          </div>
          <p id="stat-cleared" style="font-size:2rem;font-weight:800;color:#059669;letter-spacing:-0.04em;line-height:1;">—</p>
        </div>

        <div class="card" style="padding:18px;">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;">
            <p style="font-size:0.6875rem;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:0.07em;">Pending</p>
            <div class="stat-icon" style="background:#fffbeb;">
              <svg style="width:18px;height:18px;color:#f59e0b;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75"><circle cx="12" cy="12" r="10"/><path stroke-linecap="round" d="M12 6v6l4 2"/></svg>
            </div>
          </div>
          <p id="stat-pending" style="font-size:2rem;font-weight:800;color:#d97706;letter-spacing:-0.04em;line-height:1;">—</p>
        </div>

        <div class="card" style="padding:18px;">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;">
            <p style="font-size:0.6875rem;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:0.07em;">Expired</p>
            <div class="stat-icon" style="background:#fef2f2;">
              <svg style="width:18px;height:18px;color:#ef4444;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>
            </div>
          </div>
          <p id="stat-expired" style="font-size:2rem;font-weight:800;color:#dc2626;letter-spacing:-0.04em;line-height:1;">—</p>
        </div>

      </div>

      <!-- Two panels -->
      <div class="grid lg:grid-cols-2 gap-5">

        <!-- Expiring soon -->
        <div id="expiring-section" class="hidden card overflow-hidden">
          <div class="card-header">
            <div>
              <p class="card-title">Expiring Soon</p>
              <p class="card-sub" id="expiring-subtitle"></p>
            </div>
            <a href="reminders.html" class="view-link">View all →</a>
          </div>
          <div id="expiring-list"><div style="padding:32px 18px;text-align:center;font-size:0.875rem;color:#9ca3af;">Loading…</div></div>
        </div>

        <!-- Recently added -->
        <div class="card overflow-hidden">
          <div class="card-header">
            <div>
              <p class="card-title">Recently Added</p>
              <p class="card-sub">Last 5 records</p>
            </div>
            <a href="records.html" class="view-link">View all →</a>
          </div>
          <div id="recent-list"><div style="padding:32px 18px;text-align:center;font-size:0.875rem;color:#9ca3af;">Loading…</div></div>
        </div>

      </div>
    </main>
  </div>

  <script src="assets/config.js"></script>
  <script src="assets/auth.js"></script>
  <script src="assets/db.js"></script>
  <script src="assets/ui.js"></script>
  <script>
    let currentUser = null;

    async function init() {
      currentUser = await Auth.guard('viewer');
      if (!currentUser) return;
      UI.renderNav(currentUser);
      Auth.startSessionTimeout();
      await loadDashboard();
      UI.hideLoader();
    }

    async function loadDashboard() {
      try {
        const [all, expiring, expired] = await Promise.all([
          DB.getRecords(),
          Auth.isManager(currentUser) ? DB.getExpiringRecords() : Promise.resolve(null),
          DB.getExpiredRecords(),
        ]);
        document.getElementById('stat-total').textContent   = all.length;
        document.getElementById('stat-cleared').textContent = all.filter(r => r.status === 'Cleared').length;
        document.getElementById('stat-pending').textContent = all.filter(r => r.status === 'Pending').length;
        document.getElementById('stat-expired').textContent = expired.length;

        if (Auth.isManager(currentUser) && expiring) {
          document.getElementById('expiring-section').classList.remove('hidden');
          document.getElementById('expiring-subtitle').textContent = `Within ${expiring.days} days — ${expiring.records.length} record${expiring.records.length !== 1 ? 's' : ''}`;
          const el = document.getElementById('expiring-list');
          el.innerHTML = !expiring.records.length
            ? `<div style="padding:32px 18px;text-align:center;font-size:0.875rem;color:#9ca3af;">No records expiring soon.</div>`
            : expiring.records.slice(0,5).map(r => `
              <a href="record-detail.html?id=${r.id}" class="list-row">
                <div><p class="row-name">${r.employee_name}</p><p class="row-sub">${r.project}</p></div>
                <div>${UI.expirationBadge(r.expiration_date)}</div>
              </a>`).join('');
        }

        const recent = [...all].sort((a,b) => new Date(b.created_at)-new Date(a.created_at)).slice(0,5);
        const rel = document.getElementById('recent-list');
        rel.innerHTML = !recent.length
          ? `<div style="padding:32px 18px;text-align:center;font-size:0.875rem;color:#9ca3af;">No records yet.</div>`
          : recent.map(r => `
            <a href="record-detail.html?id=${r.id}" class="list-row">
              <div><p class="row-name">${r.employee_name}</p><p class="row-sub">${r.project} · ${UI.formatDate(r.date_ordered)}</p></div>
              ${UI.statusBadge(r.status)}
            </a>`).join('');
      } catch(err) { UI.toast('Failed to load dashboard.', 'error'); console.error(err); }
    }
    init();
  </script>
</body>
</html>
