<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BGTrack — Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-100 min-h-screen flex">

  <!-- Sidebar -->
  <aside id="sidebar" class="w-56 bg-slate-800 flex-shrink-0 flex flex-col min-h-screen fixed top-0 left-0 z-30"></aside>

  <!-- Main -->
  <div class="ml-56 flex-1 flex flex-col min-h-screen">

    <!-- Top bar -->
    <header class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between sticky top-0 z-20">
      <h1 class="text-base font-semibold text-gray-800">Dashboard</h1>
      <span class="text-xs text-gray-400" id="top-date"></span>
    </header>

    <!-- Page loader -->
    <div id="page-loader" class="fixed inset-0 z-50 bg-white flex items-center justify-center">
      <svg class="w-8 h-8 animate-spin text-slate-600" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
      </svg>
    </div>

    <main class="p-6 space-y-6">

      <!-- Stat cards -->
      <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
        <div class="bg-white rounded-xl border border-gray-200 p-5 shadow-sm">
          <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Total Records</p>
          <p id="stat-total" class="text-3xl font-bold text-gray-900">—</p>
        </div>
        <div class="bg-white rounded-xl border border-gray-200 p-5 shadow-sm">
          <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Cleared</p>
          <p id="stat-cleared" class="text-3xl font-bold text-emerald-600">—</p>
        </div>
        <div class="bg-white rounded-xl border border-gray-200 p-5 shadow-sm">
          <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Pending</p>
          <p id="stat-pending" class="text-3xl font-bold text-amber-500">—</p>
        </div>
        <div class="bg-white rounded-xl border border-gray-200 p-5 shadow-sm">
          <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Expired</p>
          <p id="stat-expired" class="text-3xl font-bold text-red-500">—</p>
        </div>
      </div>

      <!-- Two columns -->
      <div class="grid lg:grid-cols-2 gap-6">

        <!-- Expiring soon -->
        <div id="expiring-section" class="hidden bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
          <div class="flex items-center justify-between px-5 py-4 border-b border-gray-100">
            <div>
              <h2 class="text-sm font-semibold text-gray-900">Expiring Soon</h2>
              <p class="text-xs text-gray-400 mt-0.5" id="expiring-subtitle"></p>
            </div>
            <a href="reminders.html" class="text-xs font-medium text-blue-600 hover:text-blue-700">View all →</a>
          </div>
          <div id="expiring-list"><div class="px-5 py-8 text-center text-sm text-gray-400">Loading…</div></div>
        </div>

        <!-- Recent records -->
        <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
          <div class="flex items-center justify-between px-5 py-4 border-b border-gray-100">
            <div>
              <h2 class="text-sm font-semibold text-gray-900">Recently Added</h2>
              <p class="text-xs text-gray-400 mt-0.5">Last 5 records</p>
            </div>
            <a href="records.html" class="text-xs font-medium text-blue-600 hover:text-blue-700">View all →</a>
          </div>
          <div id="recent-list"><div class="px-5 py-8 text-center text-sm text-gray-400">Loading…</div></div>
        </div>

      </div>
    </main>
  </div>

  <script src="assets/config.js"></script>
  <script src="assets/auth.js"></script>
  <script src="assets/db.js"></script>
  <script src="assets/ui.js"></script>
  <script>
    let currentUser = null;
    document.getElementById('top-date').textContent = new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });

    async function init() {
      currentUser = await Auth.guard('viewer');
      if (!currentUser) return;
      UI.renderNav(currentUser);
      await loadDashboard();
      UI.hideLoader();
    }

    async function loadDashboard() {
      try {
        const [all, expiring, expired] = await Promise.all([
          DB.getRecords(),
          Auth.isManager(currentUser) ? DB.getExpiringRecords() : Promise.resolve(null),
          DB.getExpiredRecords(),
        ]);
        document.getElementById('stat-total').textContent   = all.length;
        document.getElementById('stat-cleared').textContent = all.filter(r => r.status === 'Cleared').length;
        document.getElementById('stat-pending').textContent = all.filter(r => r.status === 'Pending').length;
        document.getElementById('stat-expired').textContent = expired.length;

        if (Auth.isManager(currentUser) && expiring) {
          document.getElementById('expiring-section').classList.remove('hidden');
          document.getElementById('expiring-subtitle').textContent = `Within ${expiring.days} days — ${expiring.records.length} record${expiring.records.length !== 1 ? 's' : ''}`;
          const el = document.getElementById('expiring-list');
          el.innerHTML = !expiring.records.length
            ? `<div class="px-5 py-8 text-center text-sm text-gray-400">No records expiring soon.</div>`
            : expiring.records.slice(0,5).map(r => `
              <a href="record-detail.html?id=${r.id}" class="flex items-center justify-between px-5 py-3 hover:bg-slate-50 transition-colors border-b border-gray-50 last:border-0">
                <div><p class="text-sm font-medium text-gray-900">${r.employee_name}</p><p class="text-xs text-gray-400">${r.project}</p></div>
                <div>${UI.expirationBadge(r.expiration_date)}</div>
              </a>`).join('');
        }

        const recent = [...all].sort((a,b) => new Date(b.created_at)-new Date(a.created_at)).slice(0,5);
        const rel = document.getElementById('recent-list');
        rel.innerHTML = !recent.length
          ? `<div class="px-5 py-8 text-center text-sm text-gray-400">No records yet.</div>`
          : recent.map(r => `
            <a href="record-detail.html?id=${r.id}" class="flex items-center justify-between px-5 py-3 hover:bg-slate-50 transition-colors border-b border-gray-50 last:border-0">
              <div><p class="text-sm font-medium text-gray-900">${r.employee_name}</p><p class="text-xs text-gray-400">${r.project} · ${UI.formatDate(r.date_ordered)}</p></div>
              ${UI.statusBadge(r.status)}
            </a>`).join('');
      } catch(err) { UI.toast('Failed to load dashboard.', 'error'); console.error(err); }
    }
    init();
  </script>
</body>
</html>
