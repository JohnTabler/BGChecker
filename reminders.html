<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BGTrack — Reminders</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body{font-family:'Inter',sans-serif;} th{white-space:nowrap;}</style>
</head>
<body class="bg-slate-100 min-h-screen flex">
  <aside id="sidebar" class="w-56 bg-slate-800 flex-shrink-0 flex flex-col min-h-screen fixed top-0 left-0 z-30"></aside>
  <div class="ml-56 flex-1 flex flex-col min-h-screen">
    <header class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between sticky top-0 z-20">
      <h1 class="text-base font-semibold text-gray-800">Reminders</h1>
      <button id="export-btn" class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-gray-600 bg-gray-100 rounded-lg hover:bg-gray-200 transition-colors">⬇ Export CSV</button>
    </header>

    <div id="page-loader" class="fixed inset-0 z-50 bg-white flex items-center justify-center">
      <svg class="w-8 h-8 animate-spin text-slate-600" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
      </svg>
    </div>

    <main class="p-6 space-y-4">
      <p id="reminder-subtitle" class="text-sm text-gray-500"></p>

      <!-- Tabs -->
      <div class="flex gap-1 bg-gray-200 p-1 rounded-lg w-fit">
        <button id="tab-upcoming" onclick="switchTab('upcoming')" class="px-4 py-1.5 rounded-md text-xs font-medium transition-colors bg-white text-gray-900 shadow-sm">Upcoming</button>
        <button id="tab-expired"  onclick="switchTab('expired')"  class="px-4 py-1.5 rounded-md text-xs font-medium transition-colors text-gray-500 hover:text-gray-700">Expired</button>
      </div>

      <!-- Filters -->
      <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-4">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
          <input id="f-employee" type="text" placeholder="Employee" class="px-3 py-2 border border-gray-300 rounded-lg text-xs focus:outline-none focus:ring-2 focus:ring-slate-400"/>
          <input id="f-project"  type="text" placeholder="Project"  class="px-3 py-2 border border-gray-300 rounded-lg text-xs focus:outline-none focus:ring-2 focus:ring-slate-400"/>
          <input id="f-vendor"   type="text" placeholder="Vendor"   class="px-3 py-2 border border-gray-300 rounded-lg text-xs focus:outline-none focus:ring-2 focus:ring-slate-400"/>
          <div class="flex gap-2">
            <select id="f-status" class="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-xs focus:outline-none focus:ring-2 focus:ring-slate-400 text-gray-600">
              <option value="">All statuses</option>
              <option>Pending</option><option>Cleared</option><option>Failed</option><option>Cancelled</option>
            </select>
            <button id="clear-filters" class="px-3 py-2 text-xs text-gray-400 hover:text-gray-700 border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors" title="Clear">✕</button>
          </div>
        </div>
      </div>

      <!-- Table -->
      <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
        <div class="px-5 py-3 border-b border-gray-100">
          <p id="result-info" class="text-xs font-medium text-gray-500"></p>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="border-b border-gray-200 bg-gray-50">
                <th class="text-left px-5 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Employee</th>
                <th class="text-left px-5 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Project</th>
                <th class="text-left px-5 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Vendor</th>
                <th class="text-left px-5 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Status</th>
                <th class="text-left px-5 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Expiration</th>
                <th class="text-left px-5 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Days</th>
                <th class="px-5 py-3"></th>
              </tr>
            </thead>
            <tbody id="reminders-tbody" class="divide-y divide-gray-100">
              <tr><td colspan="7" class="text-center py-12 text-gray-400 text-sm">Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="assets/config.js"></script>
  <script src="assets/auth.js"></script>
  <script src="assets/db.js"></script>
  <script src="assets/ui.js"></script>
  <script src="assets/export.js"></script>
  <script>
    let currentUser=null, upcomingAll=[], expiredAll=[], upcomingFiltered=[], expiredFiltered=[], activeTab='upcoming', reminderDays=20;

    async function init() {
      currentUser = await Auth.guard('manager');
      if (!currentUser) return;
      UI.renderNav(currentUser);
      await loadData();
      attachListeners();
      UI.hideLoader();
    }

    async function loadData() {
      try {
        const [upcoming, expired] = await Promise.all([DB.getExpiringRecords(), DB.getExpiredRecords()]);
        reminderDays = upcoming.days;
        upcomingAll = upcoming.records; expiredAll = expired;
        upcomingFiltered = [...upcomingAll]; expiredFiltered = [...expiredAll];
        document.getElementById('reminder-subtitle').textContent = `Showing checks expiring within ${reminderDays} days · ${upcomingAll.length} upcoming, ${expiredAll.length} expired`;
        renderTable();
      } catch(err) { UI.toast('Failed to load reminders.','error'); console.error(err); }
    }

    function switchTab(tab) {
      activeTab = tab;
      document.getElementById('tab-upcoming').className = tab==='upcoming' ? 'px-4 py-1.5 rounded-md text-xs font-medium transition-colors bg-white text-gray-900 shadow-sm' : 'px-4 py-1.5 rounded-md text-xs font-medium transition-colors text-gray-500 hover:text-gray-700';
      document.getElementById('tab-expired').className  = tab==='expired'  ? 'px-4 py-1.5 rounded-md text-xs font-medium transition-colors bg-white text-gray-900 shadow-sm' : 'px-4 py-1.5 rounded-md text-xs font-medium transition-colors text-gray-500 hover:text-gray-700';
      applyFilters();
    }

    function applyFilters() {
      const e = document.getElementById('f-employee').value.trim().toLowerCase();
      const p = document.getElementById('f-project').value.trim().toLowerCase();
      const v = document.getElementById('f-vendor').value.trim().toLowerCase();
      const s = document.getElementById('f-status').value;
      const source = activeTab==='upcoming' ? upcomingAll : expiredAll;
      const filtered = source.filter(r => {
        if (e && !r.employee_name?.toLowerCase().includes(e)) return false;
        if (p && !r.project?.toLowerCase().includes(p)) return false;
        if (v && !r.vendor?.toLowerCase().includes(v)) return false;
        if (s && r.status !== s) return false;
        return true;
      });
      if (activeTab==='upcoming') upcomingFiltered=filtered; else expiredFiltered=filtered;
      renderTable();
    }

    function renderTable() {
      const all = activeTab==='upcoming' ? upcomingAll : expiredAll;
      const filtered = activeTab==='upcoming' ? upcomingFiltered : expiredFiltered;
      const tbody = document.getElementById('reminders-tbody');
      const today = new Date();
      document.getElementById('result-info').textContent = `${filtered.length} of ${all.length} records`;
      if (!filtered.length) { tbody.innerHTML=`<tr><td colspan="7" class="text-center py-12 text-gray-400 text-sm">${activeTab==='upcoming'?'No upcoming expirations.':'No expired records.'}</td></tr>`; return; }
      tbody.innerHTML = filtered.map(r => {
        const exp = new Date(r.expiration_date);
        const days = Math.ceil((exp-today)/(1000*60*60*24));
        const daysDisplay = days<0 ? `<span class="text-red-600 font-medium text-xs">${Math.abs(days)}d ago</span>` : `<span class="text-amber-600 font-medium text-xs">${days}d</span>`;
        return `<tr class="hover:bg-slate-50 transition-colors">
          <td class="px-5 py-3.5 font-medium text-gray-900 text-sm">${r.employee_name}</td>
          <td class="px-5 py-3.5 text-gray-600 text-sm">${r.project}</td>
          <td class="px-5 py-3.5 text-gray-600 text-sm">${r.vendor||'—'}</td>
          <td class="px-5 py-3.5">${UI.statusBadge(r.status)}</td>
          <td class="px-5 py-3.5 text-gray-600 text-sm">${UI.formatDate(r.expiration_date)}</td>
          <td class="px-5 py-3.5">${daysDisplay}</td>
          <td class="px-5 py-3.5 text-right"><a href="record-detail.html?id=${r.id}" class="text-xs font-medium text-blue-600 hover:text-blue-700">View →</a></td>
        </tr>`;
      }).join('');
    }

    function attachListeners() {
      ['f-employee','f-project','f-vendor','f-status'].forEach(id => document.getElementById(id).addEventListener('input', applyFilters));
      document.getElementById('clear-filters').addEventListener('click', () => {
        ['f-employee','f-project','f-vendor'].forEach(id => document.getElementById(id).value='');
        document.getElementById('f-status').value=''; applyFilters();
      });
      document.getElementById('export-btn').addEventListener('click', () => {
        const all = activeTab==='upcoming' ? upcomingAll : expiredAll;
        const filtered = activeTab==='upcoming' ? upcomingFiltered : expiredFiltered;
        Exporter.showExportModal({ allRows: all, filteredRows: filtered, type: 'reminders' });
      });
    }
    init();
  </script>
</body>
</html>
