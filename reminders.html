<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BGTrack — Reminders</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .nav-link { padding: 0.5rem 0.75rem; border-radius: 0.5rem; font-size: 0.875rem; font-weight: 500; color: #4b5563; transition: all 0.15s; }
    .nav-link:hover { color: #4f46e5; background-color: #eef2ff; }
    .nav-link-active { color: #4f46e5 !important; background-color: #eef2ff !important; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <header class="bg-white border-b border-gray-200 sticky top-0 z-40 shadow-sm">
    <div id="main-nav" class="max-w-7xl mx-auto"></div>
  </header>

  <div id="page-loader" class="fixed inset-0 z-50 bg-white flex items-center justify-center">
    <svg class="w-8 h-8 animate-spin text-indigo-600" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
    </svg>
  </div>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 py-8">

    <!-- Header -->
    <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
      <div>
        <h1 class="text-2xl font-bold text-gray-900">Reminders</h1>
        <p id="reminder-subtitle" class="text-sm text-gray-500 mt-1">Loading…</p>
      </div>
      <button id="export-btn"
        class="flex items-center gap-2 px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
        </svg>
        Export CSV
      </button>
    </div>

    <!-- Tabs -->
    <div class="flex gap-1 bg-gray-100 p-1 rounded-xl w-fit mb-6">
      <button id="tab-upcoming" onclick="switchTab('upcoming')"
        class="tab-btn px-4 py-2 rounded-lg text-sm font-medium transition-colors bg-white text-gray-900 shadow-sm">
        Upcoming Expirations
      </button>
      <button id="tab-expired" onclick="switchTab('expired')"
        class="tab-btn px-4 py-2 rounded-lg text-sm font-medium transition-colors text-gray-500 hover:text-gray-700">
        Already Expired
      </button>
    </div>

    <!-- Filters -->
    <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-4 mb-5">
      <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
        <input id="f-employee" type="text" placeholder="Employee name"
          class="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
        <input id="f-project" type="text" placeholder="Project"
          class="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
        <input id="f-vendor" type="text" placeholder="Vendor"
          class="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
        <div class="flex gap-2">
          <select id="f-status"
            class="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 text-gray-600">
            <option value="">All statuses</option>
            <option>Pending</option>
            <option>Cleared</option>
            <option>Failed</option>
            <option>Cancelled</option>
          </select>
          <button id="clear-filters"
            class="px-3 py-2 text-sm text-gray-500 hover:text-gray-700 border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors" title="Clear filters">
            ✕
          </button>
        </div>
      </div>
    </div>

    <!-- Table -->
    <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
      <div id="result-info" class="px-5 py-3 border-b border-gray-100 text-xs text-gray-500 font-medium"></div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-gray-200 bg-gray-50">
              <th class="text-left px-5 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Employee</th>
              <th class="text-left px-5 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Project</th>
              <th class="text-left px-5 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Vendor</th>
              <th class="text-left px-5 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Status</th>
              <th class="text-left px-5 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Expiration</th>
              <th class="text-left px-5 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Days</th>
              <th class="px-5 py-3"></th>
            </tr>
          </thead>
          <tbody id="reminders-tbody" class="divide-y divide-gray-100">
            <tr><td colspan="7" class="text-center py-12 text-gray-400">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>

  <script src="assets/config.js"></script>
  <script src="assets/auth.js"></script>
  <script src="assets/db.js"></script>
  <script src="assets/ui.js"></script>
  <script src="assets/export.js"></script>
  <script>
    let currentUser    = null;
    let upcomingAll    = [];
    let expiredAll     = [];
    let upcomingFiltered = [];
    let expiredFiltered  = [];
    let activeTab      = 'upcoming';
    let reminderDays   = 20;

    async function init() {
      currentUser = await Auth.guard('manager');
      if (!currentUser) return;

      UI.renderNav(currentUser);
      await loadData();
      attachListeners();
      UI.hideLoader();
    }

    async function loadData() {
      try {
        const [upcoming, expired] = await Promise.all([
          DB.getExpiringRecords(),
          DB.getExpiredRecords(),
        ]);

        reminderDays     = upcoming.days;
        upcomingAll      = upcoming.records;
        expiredAll       = expired;
        upcomingFiltered = [...upcomingAll];
        expiredFiltered  = [...expiredAll];

        document.getElementById('reminder-subtitle').textContent =
          `Showing checks expiring within ${reminderDays} days · ${upcomingAll.length} upcoming, ${expiredAll.length} expired`;

        renderTable();
      } catch (err) {
        UI.toast('Failed to load reminders.', 'error');
        console.error(err);
      }
    }

    function switchTab(tab) {
      activeTab = tab;
      document.getElementById('tab-upcoming').className =
        tab === 'upcoming'
          ? 'tab-btn px-4 py-2 rounded-lg text-sm font-medium transition-colors bg-white text-gray-900 shadow-sm'
          : 'tab-btn px-4 py-2 rounded-lg text-sm font-medium transition-colors text-gray-500 hover:text-gray-700';
      document.getElementById('tab-expired').className =
        tab === 'expired'
          ? 'tab-btn px-4 py-2 rounded-lg text-sm font-medium transition-colors bg-white text-gray-900 shadow-sm'
          : 'tab-btn px-4 py-2 rounded-lg text-sm font-medium transition-colors text-gray-500 hover:text-gray-700';

      applyFilters();
    }

    function getActiveData() {
      return activeTab === 'upcoming'
        ? { all: upcomingAll, filtered: upcomingFiltered }
        : { all: expiredAll,  filtered: expiredFiltered };
    }

    function applyFilters() {
      const employee = document.getElementById('f-employee').value.trim().toLowerCase();
      const project  = document.getElementById('f-project').value.trim().toLowerCase();
      const vendor   = document.getElementById('f-vendor').value.trim().toLowerCase();
      const status   = document.getElementById('f-status').value;

      const source = activeTab === 'upcoming' ? upcomingAll : expiredAll;
      const filtered = source.filter(r => {
        if (employee && !r.employee_name?.toLowerCase().includes(employee)) return false;
        if (project  && !r.project?.toLowerCase().includes(project))        return false;
        if (vendor   && !r.vendor?.toLowerCase().includes(vendor))           return false;
        if (status   && r.status !== status)                                  return false;
        return true;
      });

      if (activeTab === 'upcoming') upcomingFiltered = filtered;
      else expiredFiltered = filtered;

      renderTable();
    }

    function renderTable() {
      const { all, filtered } = getActiveData();
      const tbody = document.getElementById('reminders-tbody');
      const today = new Date();

      document.getElementById('result-info').textContent =
        `${filtered.length} of ${all.length} records`;

      if (!filtered.length) {
        tbody.innerHTML = `<tr><td colspan="7" class="text-center py-12 text-gray-400">
          ${activeTab === 'upcoming' ? 'No upcoming expirations.' : 'No expired records.'}
        </td></tr>`;
        return;
      }

      tbody.innerHTML = filtered.map(r => {
        const exp  = new Date(r.expiration_date);
        const days = Math.ceil((exp - today) / (1000 * 60 * 60 * 24));
        const daysDisplay = days < 0
          ? `<span class="text-red-600 font-medium">${Math.abs(days)}d ago</span>`
          : `<span class="text-amber-600 font-medium">${days}d</span>`;

        return `
          <tr class="hover:bg-gray-50 transition-colors">
            <td class="px-5 py-3.5 font-medium text-gray-900">${r.employee_name}</td>
            <td class="px-5 py-3.5 text-gray-600">${r.project}</td>
            <td class="px-5 py-3.5 text-gray-600">${r.vendor || '—'}</td>
            <td class="px-5 py-3.5">${UI.statusBadge(r.status)}</td>
            <td class="px-5 py-3.5 text-gray-600">${UI.formatDate(r.expiration_date)}</td>
            <td class="px-5 py-3.5">${daysDisplay}</td>
            <td class="px-5 py-3.5 text-right">
              <a href="record-detail.html?id=${r.id}" class="text-xs font-medium text-indigo-600 hover:text-indigo-700">View →</a>
            </td>
          </tr>`;
      }).join('');
    }

    function attachListeners() {
      ['f-employee','f-project','f-vendor','f-status'].forEach(id =>
        document.getElementById(id).addEventListener('input', applyFilters));

      document.getElementById('clear-filters').addEventListener('click', () => {
        ['f-employee','f-project','f-vendor'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('f-status').value = '';
        applyFilters();
      });

      document.getElementById('export-btn').addEventListener('click', () => {
        const { all, filtered } = getActiveData();
        Exporter.showExportModal({ allRows: all, filteredRows: filtered, type: 'reminders' });
      });
    }

    init();
  </script>
</body>
</html>
